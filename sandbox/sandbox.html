<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>הסוכן החשאי · Secret Agent</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: "Segoe UI", Arial, sans-serif;
    background: radial-gradient(circle at 50% 0%, #1f2a44 0%, #0d1322 70%);
    color: #f4f7ff;
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }
  #app { width: 100%; max-width: 760px; padding: 12px; flex: 1; display: flex; flex-direction: column; }

  .screen { display: none; flex: 1; flex-direction: column; }
  .screen.active { display: flex; }

  h1 { font-size: 1.9rem; margin: 8px 0; text-align: center; }
  .subtitle { text-align: center; opacity: .8; margin-bottom: 18px; }

  .btn {
    border: none; border-radius: 14px; padding: 14px 22px; font-size: 1.1rem;
    font-weight: 700; cursor: pointer; font-family: inherit;
    background: linear-gradient(180deg, #4f8cff, #2f6be0); color: #fff;
    box-shadow: 0 4px 0 #234e9e; transition: transform .08s, box-shadow .08s;
    margin: 6px;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #234e9e; }
  .btn.secondary { background: linear-gradient(180deg, #6b7690, #455066); box-shadow: 0 4px 0 #333b4d; }
  .btn.gold { background: linear-gradient(180deg, #ffcf4f, #f0a91e); color: #3a2a00; box-shadow: 0 4px 0 #b87d12; }

  /* START SCREEN */
  .agent-badge { font-size: 5rem; text-align: center; margin: 6px 0; filter: drop-shadow(0 0 14px rgba(79,140,255,.6)); }
  .world-list { display: flex; flex-direction: column; gap: 12px; margin-top: 10px; }
  .world-card {
    display: flex; align-items: center; gap: 14px; padding: 14px 16px;
    background: rgba(255,255,255,.06); border: 2px solid rgba(255,255,255,.12);
    border-radius: 16px; cursor: pointer; transition: background .15s, border-color .15s;
  }
  .world-card.unlocked:hover { background: rgba(79,140,255,.18); border-color: #4f8cff; }
  .world-card.locked { opacity: .5; cursor: not-allowed; }
  .world-card .wc-emoji { font-size: 2.4rem; }
  .world-card .wc-info { flex: 1; text-align: right; }
  .world-card .wc-name { font-weight: 700; font-size: 1.15rem; }
  .world-card .wc-desc { font-size: .85rem; opacity: .75; }
  .world-card .wc-lock { font-size: 1.4rem; }

  /* PLAY SCREEN */
  .topbar { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
  .topbar .home { background: rgba(255,255,255,.1); border: none; color: #fff; font-size: 1.3rem; border-radius: 10px; padding: 6px 10px; cursor: pointer; }
  .progress-info { font-size: .85rem; opacity: .85; text-align: center; }
  .progress-bar { height: 8px; background: rgba(255,255,255,.12); border-radius: 6px; overflow: hidden; margin-bottom: 10px; }
  .progress-bar > div { height: 100%; background: linear-gradient(90deg, #4f8cff, #7df9c0); width: 0%; transition: width .3s; }

  .sentence-box {
    display: flex; align-items: center; gap: 12px; justify-content: center;
    background: rgba(255,255,255,.08); border-radius: 16px; padding: 16px;
    margin-bottom: 14px; min-height: 64px;
  }
  .sentence-text { font-size: 1.5rem; font-weight: 700; direction: ltr; letter-spacing: .3px; }
  .speak-btn {
    border: none; border-radius: 50%; width: 56px; height: 56px; min-width: 56px;
    font-size: 1.6rem; cursor: pointer; background: linear-gradient(180deg, #ffcf4f, #f0a91e);
    color: #3a2a00; box-shadow: 0 3px 0 #b87d12;
  }
  .speak-btn:active { transform: translateY(2px); }
  .speak-btn.flash { animation: flashPulse .6s ease-in-out infinite; }
  @keyframes flashPulse { 0%,100% { transform: scale(1); box-shadow: 0 3px 0 #b87d12; } 50% { transform: scale(1.18); box-shadow: 0 0 18px 6px rgba(255,207,79,.8); } }

  .room {
    flex: 1; border-radius: 18px; padding: 14px;
    display: flex; flex-wrap: wrap; gap: 10px; align-content: flex-start;
    justify-content: center; min-height: 300px;
    border: 3px solid rgba(255,255,255,.1);
  }
  .obj {
    border: none; border-radius: 16px; cursor: pointer;
    width: 84px; height: 84px; font-size: 2.7rem;
    display: flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,.92); box-shadow: 0 3px 6px rgba(0,0,0,.25);
    transition: transform .1s;
  }
  .obj:active { transform: scale(.92); }
  .obj.correct { animation: pop .5s ease; background: #8ff0b6; box-shadow: 0 0 18px 6px rgba(80,230,150,.8); }
  .obj.wrong { animation: shake .4s ease; background: #ffc9c9; }
  .obj.hintpulse { animation: hintPulse 1s ease-in-out infinite; }
  @keyframes pop { 0% { transform: scale(1);} 40% { transform: scale(1.35);} 100% { transform: scale(1.15);} }
  @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-7px);} 75%{transform:translateX(7px);} }
  @keyframes hintPulse { 0%,100%{ box-shadow:0 3px 6px rgba(0,0,0,.25);} 50%{ box-shadow:0 0 16px 6px rgba(125,249,192,.9); transform: scale(1.08);} }

  /* SCENE (illustrated room with hidden objects) */
  .room.stage { display: block; position: relative; padding: 0; overflow: hidden; background: #000; flex: 0 0 auto; width: 100%; height: auto; min-height: 0; aspect-ratio: 16 / 10; margin: 0 auto; }
  .stage > .bg { position: absolute; inset: 0; }
  .stage > .bg svg { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
  .obj-scene {
    position: absolute; transform: translate(-50%, -50%);
    background: transparent; border: none; padding: 2px; cursor: pointer;
    line-height: 1; filter: drop-shadow(0 1px 1px rgba(0,0,0,.55));
    transition: transform .1s;
  }
  .obj-scene:active { transform: translate(-50%, -50%) scale(.9); }
  .obj-scene.correct { animation: popScene .55s ease; filter: drop-shadow(0 0 8px #38e08a) drop-shadow(0 0 14px #38e08a); z-index: 5; }
  .obj-scene.wrong { animation: shakeScene .4s ease; }
  .obj-scene.hintpulse { animation: hintRing 1s ease-in-out infinite; border-radius: 50%; z-index: 5; }
  @keyframes popScene { 0%{transform:translate(-50%,-50%) scale(1);} 45%{transform:translate(-50%,-50%) scale(1.5);} 100%{transform:translate(-50%,-50%) scale(1.2);} }
  @keyframes shakeScene { 0%,100%{transform:translate(-50%,-50%) rotate(0);} 25%{transform:translate(-50%,-50%) rotate(-13deg);} 75%{transform:translate(-50%,-50%) rotate(13deg);} }
  @keyframes hintRing { 0%,100%{ box-shadow:0 0 0 0 rgba(125,249,192,0);} 50%{ box-shadow:0 0 0 6px rgba(125,249,192,.85); transform: translate(-50%,-50%) scale(1.12);} }

  /* OVERLAY (mission/world/game complete) */
  .overlay {
    position: fixed; inset: 0; background: rgba(8,12,24,.92);
    display: none; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 24px; z-index: 50;
  }
  .overlay.active { display: flex; }
  .overlay .big-emoji { font-size: 5rem; animation: bounce 1s ease infinite; }
  @keyframes bounce { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-16px);} }
  .overlay h2 { font-size: 1.8rem; margin: 10px 0 4px; }
  .overlay .en-line { direction: ltr; opacity: .85; font-size: 1.1rem; margin-bottom: 18px; }

  .footer { text-align: center; font-size: .7rem; opacity: .5; padding: 8px; direction: ltr; }

  /* confetti */
  .confetti { position: fixed; top: -10px; width: 10px; height: 14px; z-index: 60; pointer-events: none; }
</style>
</head>

<div id="app">

    <div class="agent-badge">🕵️</div>
    <h1>הסוכן החשאי</h1>

    <div class="sentence-box">

    </div>
    <div class="room" id="room"></div>
  </section>

  <div class="footer">גרסת תצוגה מקדימה · Secret Agent (World 1) · sandbox</div>
</div>

<div class="overlay" id="overlay">

  <h2 id="ovTitle">כל הכבוד!</h2>

  <div id="ovButtons"></div>
</div>

          { sentence: "Find the toothbrush.", target: "toothbrush" },
          { sentence: "Find the mirror.", target: "mirror" },
          { sentence: "Find the bathtub.", target: "bathtub" },
          { sentence: "Find the duck.", target: "duck" }
        ]
      },
      {
        name: "גינה", env: "Garden", bg: "linear-gradient(160deg,#3f6b35,#2a4a24)",
        objects: [
          { key: "tree", emoji: "🌳", en: "tree" },
          { key: "flower", emoji: "🌸", en: "flower" },
          { key: "butterfly", emoji: "🦋", en: "butterfly" },
          { key: "bird", emoji: "🐦", en: "bird" },
          { key: "ball", emoji: "⚽", en: "ball" },
          { key: "cat", emoji: "🐱", en: "cat" },
          { key: "sun", emoji: "☀️", en: "sun" },
          { key: "chair", emoji: "🪑", en: "chair" }
        ],
        actions: [
          { sentence: "Find the tree.", target: "tree" },
          { sentence: "Find the flower.", target: "flower" },
          { sentence: "Find the butterfly.", target: "butterfly" },
          { sentence: "Find the bird.", target: "bird" },
          { sentence: "Find the ball.", target: "ball" },
          { sentence: "Find the cat.", target: "cat" }
        ]
      },
      {
        name: "מוסך", env: "Garage", bg: "linear-gradient(160deg,#5b4a35,#3f3324)",
        objects: [
          { key: "car", emoji: "🚗", en: "car" },
          { key: "bicycle", emoji: "🚲", en: "bicycle" },
          { key: "hammer", emoji: "🔨", en: "hammer" },
          { key: "wrench", emoji: "🔧", en: "wrench" },
          { key: "ladder", emoji: "🪜", en: "ladder" },
          { key: "broom", emoji: "🧹", en: "broom" },
          { key: "box", emoji: "📦", en: "box" },
          { key: "bucket", emoji: "🪣", en: "bucket" }
        ],
        actions: [
          { sentence: "Find the car.", target: "car" },
          { sentence: "Find the bicycle.", target: "bicycle" },
          { sentence: "Find the hammer.", target: "hammer" },
          { sentence: "Find the wrench.", target: "wrench" },
          { sentence: "Find the ladder.", target: "ladder" },
          { sentence: "Find the broom.", target: "broom" }
        ]
      }
    ]
  };

  const WORLDS = [WORLD1];
  const LOCKED_WORLDS = [
    { emoji: "🏫", name: "עולם בית הספר", enName: "School", desc: "בקרוב…" },
    { emoji: "🏙️", name: "עולם העיר", enName: "City", desc: "בקרוב…" },
    { emoji: "🚀", name: "עולם הסוכן המיוחד", enName: "Special Agent", desc: "בקרוב…" }
  ];

  // ---------- STATE ----------
  let state = { world: 0, mission: 0, action: 0, solved: false, shuffled: [] };
  let hintTimer1 = null, hintTimer2 = null;

  // ---------- SPEECH ----------
  let voicesReady = false;
  function pickVoice() {
    const vs = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
    return vs.find(v => /en[-_]US/i.test(v.lang)) ||
           vs.find(v => /^en/i.test(v.lang)) || null;
  }
  function speak(text, rate) {
    if (!window.speechSynthesis) return;
    try {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = "en-US";
      u.rate = rate || 0.75;
      const v = pickVoice();
      if (v) u.voice = v;
      window.speechSynthesis.speak(u);
    } catch (e) { /* ignore */ }
  }
  if (window.speechSynthesis) {
    window.speechSynthesis.onvoiceschanged = function () { voicesReady = true; };
  }

  // ---------- SOUND (WebAudio) ----------
  let audioCtx = null;
  function ac() {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch (e) { audioCtx = null; }
    }
    return audioCtx;
  }
  function tone(freqs, dur, type) {
    const c = ac(); if (!c) return;
    const now = c.currentTime;
    freqs.forEach((f, i) => {
      const o = c.createOscillator(), g = c.createGain();
      o.type = type || "sine"; o.frequency.value = f;
      const t = now + i * 0.12;
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.25, t + 0.03);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      o.connect(g); g.connect(c.destination);
      o.start(t); o.stop(t + dur + 0.02);
    });
  }
  function successSound() { tone([523, 659, 784], 0.25, "triangle"); }
  function errorSound() { tone([240, 180], 0.22, "sine"); }

  // ---------- HELPERS ----------
  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }
  function $(id) { return document.getElementById(id); }

  // ---------- SCREENS ----------
  function showScreen(id) {
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    $(id).classList.add("active");
  }

  function buildStart() {
    const list = $("worldList");
    list.innerHTML = "";
    WORLDS.forEach((w, idx) => {
      const card = document.createElement("div");
      card.className = "world-card unlocked";
      card.innerHTML = '<div class="wc-emoji">' + w.emoji + '</div>' +
        '<div class="wc-info"><div class="wc-name">' + w.name + '</div>' +
        '<div class="wc-desc">' + w.enName + ' · ' + w.desc + '</div></div>' +
        '<div class="wc-lock">▶️</div>';
      card.addEventListener("click", function () { startWorld(idx); });
      list.appendChild(card);
    });
    LOCKED_WORLDS.forEach(function (w) {
      const card = document.createElement("div");
      card.className = "world-card locked";
      card.innerHTML = '<div class="wc-emoji">' + w.emoji + '</div>' +
        '<div class="wc-info"><div class="wc-name">' + w.name + '</div>' +
        '<div class="wc-desc">' + w.enName + ' · ' + w.desc + '</div></div>' +
        '<div class="wc-lock">🔒</div>';
      list.appendChild(card);
    });
  }

  function startWorld(idx) {
    if (ac() && audioCtx.state === "suspended") audioCtx.resume();
    state.world = idx; state.mission = 0; state.action = 0;
    showScreen("screen-play");
    renderAction();
  }

  function curMission() { return WORLDS[state.world].missions[state.mission]; }
  function curAction() { return curMission().actions[state.action]; }

  function renderAction() {
    clearHints();
    state.solved = false;
    const mission = curMission();
    const action = curAction();
    $("screen-play").style.background = mission.bg;

    // progress
    const totalActions = mission.actions.length;
    $("progressInfo").textContent =
      mission.name + " · משימה " + (state.mission + 1) + "/" + WORLDS[state.world].missions.length +
      " · פעולה " + (state.action + 1) + "/" + totalActions;
    $("progressFill").style.width = (((state.action) / totalActions) * 100) + "%";

    $("sentenceText").textContent = action.sentence;

    // objects
    const room = $("room");
    room.innerHTML = "";
    if (mission.scene) {
      room.className = "room stage";
      room.style.background = mission.bg;
      const bg = document.createElement("div");
      bg.className = "bg";
      bg.innerHTML = mission.sceneSVG;
      room.appendChild(bg);
      mission.objects.forEach(function (obj) {
        const b = document.createElement("button");
        b.className = "obj-scene";
        b.textContent = obj.emoji;
        b.style.left = obj.x + "%";
        b.style.top = obj.y + "%";
        b.style.fontSize = (obj.size || 2.6) + "rem";
        b.setAttribute("data-key", obj.key);
        b.setAttribute("aria-label", obj.en);
        b.addEventListener("click", function () { onObjectClick(obj, b); });
        room.appendChild(b);
      });
    } else {
      room.className = "room";
      room.style.background = mission.bg;
      state.shuffled = shuffle(mission.objects);
      state.shuffled.forEach(function (obj) {
        const b = document.createElement("button");
        b.className = "obj";
        b.textContent = obj.emoji;
        b.setAttribute("data-key", obj.key);
        b.setAttribute("aria-label", obj.en);
        b.addEventListener("click", function () { onObjectClick(obj, b); });
        room.appendChild(b);
      });
    }

    // auto-read the sentence once, then arm hints
    setTimeout(function () { speak(action.sentence, 0.7); }, 350);
    armHints();
  }

  function onObjectClick(obj, el) {
    if (state.solved) return;
    const action = curAction();
    if (obj.key === action.target) {
      state.solved = true;
      clearHints();
      el.classList.add("correct");
      successSound();
      launchConfetti();
      speak("Great! You found the " + obj.en + "!", 0.8);
      $("progressFill").style.width =
        (((state.action + 1) / curMission().actions.length) * 100) + "%";
      setTimeout(nextAction, 1500);
    } else {
      el.classList.remove("wrong");
      void el.offsetWidth;
      el.classList.add("wrong");
      errorSound();
      speak(obj.en, 0.85);
    }
  }

  function nextAction() {
    const mission = curMission();
    if (state.action + 1 < mission.actions.length) {
      state.action++;
      renderAction();
    } else {
      missionComplete();
    }
  }

  // ---------- HINTS ----------
  function armHints() {
    hintTimer1 = setTimeout(function () {
      $("speakBtn").classList.add("flash");
      speak(curAction().sentence, 0.65);
      hintTimer2 = setTimeout(function () {
        const room = $("room");
        const t = room.querySelector('[data-key="' + curAction().target + '"]');
        if (t) t.classList.add("hintpulse");
      }, 5000);
    }, 7000);
  }
  function clearHints() {
    if (hintTimer1) clearTimeout(hintTimer1);
    if (hintTimer2) clearTimeout(hintTimer2);
    hintTimer1 = hintTimer2 = null;
    $("speakBtn").classList.remove("flash");
    document.querySelectorAll(".obj.hintpulse").forEach(function (e) { e.classList.remove("hintpulse"); });
  }

  // ---------- OVERLAYS ----------
  function showOverlay(emoji, titleHe, enLine, buttons) {
    $("ovEmoji").textContent = emoji;
    $("ovTitle").textContent = titleHe;
    $("ovEn").textContent = enLine;
    const bc = $("ovButtons");
    bc.innerHTML = "";
    buttons.forEach(function (b) {
      const el = document.createElement("button");
      el.className = "btn " + (b.cls || "");
      el.textContent = b.label;
      el.addEventListener("click", function () { hideOverlay(); b.fn(); });
      bc.appendChild(el);
    });
    $("overlay").classList.add("active");
    speak(enLine, 0.8);
  }
  function hideOverlay() { $("overlay").classList.remove("active"); }

  function missionComplete() {
    clearHints();
    const isLastMission = state.mission + 1 >= WORLDS[state.world].missions.length;
    if (isLastMission) {
      worldComplete();
    } else {
      showOverlay("🎉", "כל הכבוד! השלמת את המשימה הסודית!", "Great job! Mission complete!",
        [{ label: "למשימה הסודית הבאה", cls: "", fn: function () {
          state.mission++; state.action = 0; renderAction();
        } }]);
    }
  }

  function worldComplete() {
    const isLastWorld = state.world + 1 >= WORLDS.length;
    if (isLastWorld) {
      // Only built worlds finished -> celebrate + note more coming
      showOverlay("🏆", "כל הכבוד! סיימת את עולם הבית והחצר!", "Outstanding! World complete!",
        [
          { label: "שחק שוב", cls: "gold", fn: function () { startWorld(state.world); } },
          { label: "בחזרה לתפריט", cls: "secondary", fn: goHome }
        ]);
    } else {
      showOverlay("🌟", "כל הכבוד! השלמת את כל המשימות הסודיות בעולם!", "Excellent! You completed all the missions!",
        [{ label: "לעולם הבא", cls: "gold", fn: function () {
          state.world++; state.mission = 0; state.action = 0; renderAction();
        } }]);
    }
  }

  function goHome() {
    clearHints();
    if (window.speechSynthesis) window.speechSynthesis.cancel();
    showScreen("screen-start");
  }

  // ---------- CONFETTI ----------
  function launchConfetti() {
    const colors = ["#ffcf4f", "#4f8cff", "#7df9c0", "#ff7eb6", "#b58cff"];
    for (let i = 0; i < 18; i++) {
      const c = document.createElement("div");
      c.className = "confetti";
      c.style.left = (Math.random() * 100) + "vw";
      c.style.background = colors[i % colors.length];
      c.style.transform = "rotate(" + (Math.random() * 360) + "deg)";
      document.body.appendChild(c);
      const dur = 900 + Math.random() * 700;
      c.animate([
        { top: "-10px", opacity: 1 },
        { top: (60 + Math.random() * 30) + "vh", opacity: 0 }
      ], { duration: dur, easing: "ease-in" });
      setTimeout(function () { c.remove(); }, dur + 50);
    }
  }

  // ---------- EVENTS ----------
  $("speakBtn").addEventListener("click", function () {
    if (ac() && audioCtx.state === "suspended") audioCtx.resume();
    speak(curAction().sentence, 0.65);
  });
  $("homeBtn").addEventListener("click", goHome);

  // ---------- INIT ----------
  buildStart();
  // warm up voices
  if (window.speechSynthesis) { try { window.speechSynthesis.getVoices(); } catch (e) {} }
})();
</script>
</body>
</html>
