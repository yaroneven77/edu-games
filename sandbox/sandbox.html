<!DOCTYPE html>
<html lang="he" dir="rtl">

<meta charset="UTF-8">

<title>הסוכן החשאי · Secret Agent</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: "Segoe UI", Arial, sans-serif;
    background: radial-gradient(circle at 50% 0%, #1f2a44 0%, #0d1322 70%);
    color: #f4f7ff;
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }
  #app { width: 100%; max-width: 760px; padding: 12px; flex: 1; display: flex; flex-direction: column; }

  .screen { display: none; flex: 1; flex-direction: column; }
  .screen.active { display: flex; }

  h1 { font-size: 1.9rem; margin: 8px 0; text-align: center; }
  .subtitle { text-align: center; opacity: .8; margin-bottom: 18px; }

  .btn {
    border: none; border-radius: 14px; padding: 14px 22px; font-size: 1.1rem;
    font-weight: 700; cursor: pointer; font-family: inherit;
    background: linear-gradient(180deg, #4f8cff, #2f6be0); color: #fff;
    box-shadow: 0 4px 0 #234e9e; transition: transform .08s, box-shadow .08s;
    margin: 6px;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #234e9e; }
  .btn.secondary { background: linear-gradient(180deg, #6b7690, #455066); box-shadow: 0 4px 0 #333b4d; }
  .btn.gold { background: linear-gradient(180deg, #ffcf4f, #f0a91e); color: #3a2a00; box-shadow: 0 4px 0 #b87d12; }

  /* START SCREEN */
  .agent-badge { font-size: 5rem; text-align: center; margin: 6px 0; filter: drop-shadow(0 0 14px rgba(79,140,255,.6)); }
  .world-list { display: flex; flex-direction: column; gap: 12px; margin-top: 10px; }
  .world-card {
    display: flex; align-items: center; gap: 14px; padding: 14px 16px;
    background: rgba(255,255,255,.06); border: 2px solid rgba(255,255,255,.12);
    border-radius: 16px; cursor: pointer; transition: background .15s, border-color .15s;
  }
  .world-card.unlocked:hover { background: rgba(79,140,255,.18); border-color: #4f8cff; }
  .world-card.locked { opacity: .5; cursor: not-allowed; }
  .world-card .wc-emoji { font-size: 2.4rem; }
  .world-card .wc-info { flex: 1; text-align: right; }
  .world-card .wc-name { font-weight: 700; font-size: 1.15rem; }
  .world-card .wc-desc { font-size: .85rem; opacity: .75; }
  .world-card .wc-lock { font-size: 1.4rem; }

  /* PLAY SCREEN */
  .topbar { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
  .topbar .home { background: rgba(0,0,0,.12); border: none; color: #111; font-size: 1.3rem; border-radius: 10px; padding: 6px 10px; cursor: pointer; }
  .mission-nav { display: flex; gap: 6px; }
  .nav-arrow { background: rgba(0,0,0,.12); border: none; color: #111; font-size: 1rem; border-radius: 10px; padding: 6px 10px; cursor: pointer; line-height: 1; }
  .nav-arrow:hover { background: rgba(0,0,0,.22); }
  .nav-arrow:disabled { opacity: .3; cursor: default; }
  .progress-info { font-size: .85rem; opacity: .95; text-align: center; color: #111; font-weight: 600; }
  .progress-bar { height: 8px; background: rgba(255,255,255,.12); border-radius: 6px; overflow: hidden; margin-bottom: 10px; }
  .progress-bar > div { height: 100%; background: linear-gradient(90deg, #4f8cff, #7df9c0); width: 0%; transition: width .3s; }

  .sentence-box {
    display: flex; align-items: center; gap: 12px; justify-content: center; flex-wrap: nowrap;
    background: rgba(255,255,255,.95); border-radius: 16px; padding: 16px;
    margin-bottom: 14px; min-height: 64px;
  }
  .sentence-text { flex: 1; min-width: 0; text-align: center; font-size: 1.5rem; font-weight: 700; direction: ltr; letter-spacing: .3px; color: #111; }
  .speak-btn {
    border: none; border-radius: 50%; width: 56px; height: 56px; min-width: 56px;
    font-size: 1.6rem; cursor: pointer; background: linear-gradient(180deg, #ffcf4f, #f0a91e);
    color: #3a2a00; box-shadow: 0 3px 0 #b87d12;
  }
  .xlate-btn {
    background: linear-gradient(180deg, #8fd0ff, #3a9be8); color: #04243f;
    box-shadow: 0 3px 0 #2176b8; font-size: 1.25rem; font-weight: 800;
  }
  .speak-btn:active { transform: translateY(2px); }
  .speak-btn.flash { animation: flashPulse .6s ease-in-out infinite; }
  @keyframes flashPulse { 0%,100% { transform: scale(1); box-shadow: 0 3px 0 #b87d12; } 50% { transform: scale(1.18); box-shadow: 0 0 18px 6px rgba(255,207,79,.8); } }

  .room {
    flex: 1; border-radius: 18px; padding: 14px;
    display: flex; flex-wrap: wrap; gap: 10px; align-content: flex-start;
    justify-content: center; min-height: 300px;
    border: 3px solid rgba(255,255,255,.1);
  }
  .obj {
    border: none; border-radius: 16px; cursor: pointer;
    width: 84px; height: 84px; font-size: 2.7rem;
    display: flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,.92); box-shadow: 0 3px 6px rgba(0,0,0,.25);
    transition: transform .1s;
  }
  .obj:active { transform: scale(.92); }
  .obj.correct { animation: pop .5s ease; background: #8ff0b6; box-shadow: 0 0 18px 6px rgba(80,230,150,.8); }
  .obj.wrong { animation: shake .4s ease; background: #ffc9c9; }
  .obj.hintpulse { animation: hintPulse 1s ease-in-out infinite; }
  @keyframes pop { 0% { transform: scale(1);} 40% { transform: scale(1.35);} 100% { transform: scale(1.15);} }
  @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-7px);} 75%{transform:translateX(7px);} }
  @keyframes hintPulse { 0%,100%{ box-shadow:0 3px 6px rgba(0,0,0,.25);} 50%{ box-shadow:0 0 16px 6px rgba(125,249,192,.9); transform: scale(1.08);} }

  /* SCENE (illustrated room with hidden objects) */
  .room.stage { display: block; position: relative; padding: 0; overflow: hidden; background: #000; flex: 0 0 auto; width: 100%; height: auto; min-height: 0; aspect-ratio: 16 / 10; margin: 0 auto; }
  .stage > .bg { position: absolute; inset: 0; }
  .stage > .bg svg { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
  .stage > .fg { position: absolute; inset: 0; pointer-events: none; }
  .stage > .fg svg { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
  .obj-scene {
    position: absolute; transform: translate(-50%, -50%);
    background: transparent; border: none; padding: 2px; cursor: pointer;
    line-height: 1; filter: drop-shadow(0 1px 1px rgba(0,0,0,.55));
    transition: transform .1s;
  }
  .obj-scene:active { transform: translate(-50%, -50%) scale(.9); }
  .obj-scene.correct { animation: popScene .55s ease; filter: drop-shadow(0 0 8px #38e08a) drop-shadow(0 0 14px #38e08a); z-index: 5; }
  .obj-scene.wrong { animation: shakeScene .4s ease; }
  .obj-scene.hintpulse { animation: hintRing 1s ease-in-out infinite; border-radius: 50%; z-index: 5; }
  @keyframes popScene { 0%{transform:translate(-50%,-50%) scale(1);} 45%{transform:translate(-50%,-50%) scale(1.5);} 100%{transform:translate(-50%,-50%) scale(1.2);} }
  @keyframes shakeScene { 0%,100%{transform:translate(-50%,-50%) rotate(0);} 25%{transform:translate(-50%,-50%) rotate(-13deg);} 75%{transform:translate(-50%,-50%) rotate(13deg);} }
  @keyframes hintRing { 0%,100%{ box-shadow:0 0 0 0 rgba(125,249,192,0);} 50%{ box-shadow:0 0 0 6px rgba(125,249,192,.85); transform: translate(-50%,-50%) scale(1.12);} }
  .obj-scene.fly { animation: flyMove 5s ease-in-out infinite; }
  @keyframes flyMove {
    0%   { transform: translate(-50%,-50%); }
    25%  { transform: translate(-150%,-90%); }
    50%  { transform: translate(40%,-70%); }
    75%  { transform: translate(-100%,-115%); }
    100% { transform: translate(-50%,-50%); }
  }

  /* IMAGE ROOM (real drawing background + transparent hotspots) */
  .stage.imgroom { aspect-ratio: 3 / 2; }
  .stage > .bgimg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: fill; display: block; }
  .hotspot {
    position: absolute; transform: translate(-50%, -50%);
    background: transparent; border: 2px solid transparent; border-radius: 14px;
    padding: 0; cursor: pointer; transition: transform .1s;
  }
  .hotspot:active { transform: translate(-50%, -50%) scale(.94); }
  .hotspot.correct { animation: hsPop .5s ease; border-color: #38e08a; background: rgba(56,224,138,.18); box-shadow: 0 0 0 4px rgba(56,224,138,.55), 0 0 18px 6px rgba(56,224,138,.5); z-index: 5; }
  .hotspot.wrong { animation: shakeScene .4s ease; border-color: #ff6b6b; background: rgba(255,107,107,.2); }
  .hotspot.hintpulse { animation: hintRing 1s ease-in-out infinite; z-index: 5; }
  @keyframes hsPop { 0%{transform:translate(-50%,-50%) scale(1);} 45%{transform:translate(-50%,-50%) scale(1.12);} 100%{transform:translate(-50%,-50%) scale(1.05);} }

  /* narration lock: while the English sentence is read, clicks wait */
  .room.listening .hotspot, .room.listening .obj, .room.listening .obj-scene { pointer-events: none; }
  .room.listening { filter: brightness(.92); }
  .listen-badge {
    position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
    background: #1d6fd6; color: #fff; padding: 8px 20px; border-radius: 22px;
    font-size: 1rem; font-weight: 700; box-shadow: 0 4px 14px rgba(0,0,0,.45);
    z-index: 70; display: none; direction: rtl;
  }
  .listen-badge.active { display: block; animation: listenPulse 1s ease-in-out infinite; }
  @keyframes listenPulse { 0%,100%{ transform:translateX(-50%) scale(1);} 50%{ transform:translateX(-50%) scale(1.06);} }

  /* OVERLAY (mission/world/game complete) */
  .overlay {
    position: fixed; inset: 0; background: rgba(8,12,24,.92);
    display: none; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 24px; z-index: 50;
  }
  .overlay.active { display: flex; }
  .overlay .big-emoji { font-size: 5rem; animation: bounce 1s ease infinite; }
  @keyframes bounce { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-16px);} }
  .overlay h2 { font-size: 1.8rem; margin: 10px 0 4px; }
  .overlay .en-line { direction: ltr; opacity: .85; font-size: 1.1rem; margin-bottom: 18px; }

  .footer { text-align: center; font-size: .7rem; opacity: .5; padding: 8px; direction: ltr; }

  /* confetti */
  .confetti { position: fixed; top: -10px; width: 10px; height: 14px; z-index: 60; pointer-events: none; }
</style>
</head>

  // ---------- SCENE BUILDER (worlds 2-4): grounded rooms ----------
  let _sid = 0;
  function _grad(id, a, b) {
    return '<linearGradient id="' + id + '" x1="0" y1="0" x2="0" y2="1">' +
      '<stop offset="0" stop-color="' + a + '"/><stop offset="1" stop-color="' + b + '"/></linearGradient>';
  }
  function _r(x, y, w, h, f, ex) {
    return '<rect x="' + x + '" y="' + y + '" width="' + w + '" height="' + h + '" ' + (ex || '') + ' fill="' + f + '"/>';
  }
  function _shadow(cx, cy, rx, ry, op) {
    return '<ellipse cx="' + cx + '" cy="' + cy + '" rx="' + rx + '" ry="' + ry + '" fill="rgba(0,0,0,' + (op || 0.16) + ')"/>';
  }

  // object slots (percent). Interior: shelf row (on wall shelf) + counter row (on back counter).
  const INTERIOR_SLOTS = [
    [12, 44], [28, 44], [44, 44], [60, 44], [76, 44], [92, 44], // counter (top ~47)
    [24, 26], [50, 26], [76, 26]                                 // wall shelf (top ~29)
  ];
  // Outdoor: a back row (mid-ground) + a front row, both on the ground.
  const OUTDOOR_SLOTS = [
    [22, 62], [44, 62], [66, 62], [86, 62],
    [12, 80], [30, 80], [48, 80], [66, 80], [84, 80]
  ];

  // INTERIOR room: full-width back counter + wall shelf, with contact shadows under every slot.
  function roomKit(pal, feature, cc) {
    const u = 'S' + (_sid++);
    const slab = (cc && cc[0]) || '#e7cda4';
    const body = (cc && cc[1]) || '#b9894f';
    let s = '<svg viewBox="0 0 160 100" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg"><defs>';
    s += _grad(u + 'w', pal[0], pal[1]) + _grad(u + 'f', pal[2], pal[3]) + '</defs>';
    s += _r(0, 0, 160, 44, 'url(#' + u + 'w)');
    s += _r(0, 44, 160, 56, 'url(#' + u + 'f)');
    s += _r(0, 44, 160, 1.2, 'rgba(0,0,0,0.14)');
    s += '<g stroke="rgba(0,0,0,0.06)" stroke-width="0.6"><line x1="18" y1="100" x2="64" y2="45"/><line x1="142" y1="100" x2="96" y2="45"/></g>';
    s += (feature || '');
    // wall shelf (full width) board top at y=29
    s += _r(6, 29, 148, 2.4, '#9a6a36', 'rx="0.8"') + _r(6, 29, 148, 0.8, 'rgba(255,255,255,0.28)');
    s += _r(9, 31.4, 2, 2.6, '#7c5128') + _r(149, 31.4, 2, 2.6, '#7c5128');
    // shelf-row contact shadows (x 24,50,76 -> svg 38.4,80,121.6)
    s += _shadow(38.4, 29, 6, 1.1) + _shadow(80, 29, 6, 1.1) + _shadow(121.6, 29, 6, 1.1);
    // back counter: top slab at y=47, cabinet body 50-62
    s += _r(0, 50, 160, 12, body);
    s += _r(0, 47, 160, 3, slab);
    s += _r(0, 49.6, 160, 0.8, 'rgba(0,0,0,0.12)');
    s += '<g stroke="rgba(0,0,0,0.13)" stroke-width="0.7"><line x1="26" y1="50" x2="26" y2="62"/><line x1="53" y1="50" x2="53" y2="62"/><line x1="80" y1="50" x2="80" y2="62"/><line x1="107" y1="50" x2="107" y2="62"/><line x1="134" y1="50" x2="134" y2="62"/></g>';
    s += '<g fill="#5c3c18"><rect x="22" y="54" width="6" height="1.4" rx="0.6"/><rect x="49" y="54" width="6" height="1.4" rx="0.6"/><rect x="76" y="54" width="6" height="1.4" rx="0.6"/><rect x="103" y="54" width="6" height="1.4" rx="0.6"/><rect x="130" y="54" width="6" height="1.4" rx="0.6"/></g>';
    // counter-row contact shadows (x 12,28,44,60,76,92 -> svg *1.6) at y=47.2
    [12, 28, 44, 60, 76, 92].forEach(function (x) { s += _shadow(x * 1.6, 47.2, 5, 1.1); });
    // soft floor rug
    s += '<ellipse cx="80" cy="86" rx="50" ry="9" fill="rgba(0,0,0,0.05)"/>';
    s += '</svg>';
    return { svg: s, slots: INTERIOR_SLOTS };
  }

  // OUTDOOR scene: sky + ground, with contact shadows under every slot.
  function outdoorKit(pal, items, shOp) {
    const u = 'S' + (_sid++);
    let s = '<svg viewBox="0 0 160 100" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg"><defs>';
    s += _grad(u + 's', pal[0], pal[1]) + _grad(u + 'g', pal[2], pal[3]) + '</defs>';
    s += _r(0, 0, 160, 58, 'url(#' + u + 's)');
    s += _r(0, 58, 160, 42, 'url(#' + u + 'g)');
    s += _r(0, 58, 160, 1, 'rgba(0,0,0,0.08)');
    s += (items || '');
    OUTDOOR_SLOTS.forEach(function (p) { s += _shadow(p[0] * 1.6, p[1] + 3.2, p[1] > 70 ? 5.5 : 4.5, 1.3, shOp || 0.14); });
    s += '</svg>';
    return { svg: s, slots: OUTDOOR_SLOTS };
  }

  function fWin(x, y, w, h) {
    return _r(x, y, w, h, '#cfeaff', 'stroke="#ffffff" stroke-width="1.5"') +

         ["This small animal walks sideways and has two strong claws. Find the crab.", "החיה הקטנה הזו הולכת הצידה ויש לה שתי צבתות חזקות. מצא את הסרטן.", "crab"],
         ["The secret papers are hidden deep inside this cardboard. Find the box.", "המסמכים הסודיים חבויים עמוק בתוך הקרטון. מצא את הקופסה.", "box"],
         ["Throw this round ring to a person who fell in the water. Find the life ring.", "זורקים את הטבעת העגולה לאדם שנפל למים. מצא את גלגל ההצלה.", "lifebuoy"]]),
      M("מלון", "Hotel", "#efe5dd",
        roomKit(["#f5ece2", "#e6d6c4", "#c79a7a", "#9c6f4f"], fWin(10, 8, 40, 18) + fFrame(68, 6, 24, 20, "#3a5a8a") + fFrame(120, 8, 30, 16, "#caa36b"), ["#efd9c6", "#c79a6a"]),
        [["bed", "🛏️", "bed"], ["key", "🔑", "key"], ["phone", "☎️", "phone"], ["bell", "🔔", "bell"], ["suitcase", "🧳", "suitcase"], ["lamp", "💡", "lamp"], ["towel", "🧻", "towel"], ["clock", "🕐", "clock"], ["slippers", "🥿", "slippers"]],
        [["Agent, find the metal thing that opens the door to room seven. The key.", "סוכן, מצא את חפץ המתכת שפותח את הדלת לחדר שבע. המפתח.", "key"],
         ["After a long mission you lie down and sleep here. Find the bed.", "אחרי משימה ארוכה שוכבים וישנים כאן. מצא את המיטה.", "bed"],
         ["Use this to quietly call headquarters for help. Find the phone.", "משתמשים בו כדי להתקשר בשקט למפקדה לעזרה. מצא את הטלפון.", "phone"],
         ["Ring this on the desk when you need the hotel man. Find the bell.", "מצלצלים בו על הדלפק כשצריך את איש המלון. מצא את הפעמון.", "bell"],
         ["All your secret spy gadgets are packed inside this. Find the suitcase.", "כל גאדג'טי הריגול הסודיים ארוזים בתוכה. מצא את המזוודה.", "suitcase"],
         ["Turn this on to read the secret letter late at night. Find the lamp.", "מדליקים אותה כדי לקרוא את המכתב הסודי מאוחר בלילה. מצא את המנורה.", "lamp"]]),
      M("מעבדה סודית", "Secret lab", "#d2dee6",
        roomKit(["#cfdde8", "#b6c6d2", "#8a96a2", "#646e7a"], _r(8, 6, 40, 20, "#0e1a28", 'rx="1.5"') + '<g stroke="#3fd0a0" stroke-width="0.7"><line x1="12" y1="12" x2="44" y2="12"/><line x1="12" y1="17" x2="38" y2="17"/><line x1="12" y1="22" x2="42" y2="22"/></g>' + _r(60, 6, 40, 20, "#0e1a28", 'rx="1.5"') + '<g stroke="#4f9bff" stroke-width="0.7"><line x1="64" y1="12" x2="94" y2="12"/><line x1="64" y1="18" x2="88" y2="18"/></g>' + _r(112, 6, 40, 20, "#0e1a28", 'rx="1.5"') + '<g stroke="#ff7e6b" stroke-width="0.7"><line x1="116" y1="13" x2="146" y2="13"/><line x1="116" y1="19" x2="140" y2="19"/></g>', ["#9aa6b0", "#5a6672"]),
        [["computer", "💻", "computer"], ["robot", "🤖", "robot"], ["camera", "📷", "camera"], ["satellite", "📡", "satellite dish"], ["flashlight", "🔦", "flashlight"], ["microscope", "🔬", "microscope"], ["battery", "🔋", "battery"], ["magnet", "🧲", "magnet"], ["key", "🗝️", "key"]],
        [["Agent, find the screen where all the secret plans are saved. The computer.", "סוכן, מצא את המסך שבו שמורות כל התוכניות הסודיות. המחשב.", "computer"],
         ["This metal helper can walk and talk all by itself. Find the robot.", "העוזר ממתכת הזה יכול ללכת ולדבר בעצמו. מצא את הרובוט.", "robot"],
         ["Use this to take a secret photo of the enemy. Find the camera.", "משתמשים בה כדי לצלם תמונה סודית של האויב. מצא את המצלמה.", "camera"],
         ["This big dish sends secret signals all the way up to space. Find the satellite dish.", "הצלחת הגדולה הזו שולחת אותות סודיים עד החלל. מצא את הצלחת.", "satellite"],
         ["Turn this on to see your way inside the dark tunnel. Find the flashlight.", "מדליקים אותו כדי לראות את הדרך במנהרה החשוכה. מצא את הפנס.", "flashlight"],
         ["Look through this to study the tiny secret code. Find the microscope.", "מסתכלים דרכו כדי לחקור את הקוד הסודי הזעיר. מצא את המיקרוסקופ.", "microscope"]])
    ]
  };

  function M(name, env, bg, kit, objs, acts) {
    return {
      name: name, env: env, bg: bg, scene: true,
      sceneSVG: kit.svg,
      objects: objs.map(function (o, i) { return { key: o[0], emoji: o[1], en: o[2], x: kit.slots[i][0], y: kit.slots[i][1], size: o[3] || 2.0 }; }),
      actions: acts.map(function (a) { return { sentence: a[0], he: a[1], target: a[2] }; })
    };
  }

  const WORLDS = [WORLD1, WORLD2, WORLD3, WORLD4];
  const LOCKED_WORLDS = [];

  // ---------- STATE ----------
  let state = { world: 0, mission: 0, action: 0, solved: false, shuffled: [] };
  let hintTimer1 = null, hintTimer2 = null;

  // ---------- SPEECH ----------
  let voicesReady = false;
  function pickVoice() {
    const vs = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
    return vs.find(v => /en[-_]US/i.test(v.lang)) ||
           vs.find(v => /^en/i.test(v.lang)) || null;
  }
  function pickVoiceHe() {
    const vs = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
    return vs.find(v => /he[-_]IL/i.test(v.lang)) ||
           vs.find(v => /^(he|iw)/i.test(v.lang)) || null;
  }
  function speakHe(text) {
    if (!window.speechSynthesis || !text) return;
    try {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = "he-IL";
      u.rate = 0.85;
      const v = pickVoiceHe();
      if (v) u.voice = v;
      window.speechSynthesis.speak(u);
    } catch (e) { /* ignore */ }
  }
  function speak(text, rate) {
    if (!window.speechSynthesis) return;
    try {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = "en-US";
      u.rate = rate || 0.75;
      const v = pickVoice();
      if (v) u.voice = v;
      window.speechSynthesis.speak(u);
    } catch (e) { /* ignore */ }
  }
  // narration lock: while the English sentence is read aloud, the scene is
  // visibly locked ("🔊 מקשיבים…") and clicks wait; unlocked the moment it ends.
  let narrateTimer = null;
  function setNarrating(on) {
    const room = $("room");
    const badge = $("listenBadge");
    if (on) { if (room) room.classList.add("listening"); if (badge) badge.classList.add("active"); }
    else { if (room) room.classList.remove("listening"); if (badge) badge.classList.remove("active"); }
  }
  function narrate(text, rate) {
    if (!window.speechSynthesis) { setNarrating(false); return; }
    try {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = "en-US";
      u.rate = rate || 0.75;
      const v = pickVoice();
      if (v) u.voice = v;
      setNarrating(true);
      let done = false;
      const finish = function () { if (done) return; done = true; setNarrating(false); };
      u.onend = finish;
      u.onerror = finish;
      if (narrateTimer) clearTimeout(narrateTimer);
      narrateTimer = setTimeout(finish, Math.max(1800, text.length * 95) + 1200);
      window.speechSynthesis.speak(u);
    } catch (e) { setNarrating(false); }
  }
  if (window.speechSynthesis) {
    window.speechSynthesis.onvoiceschanged = function () { voicesReady = true; };
  }

  // ---------- SOUND (WebAudio) ----------
  let audioCtx = null;
  function ac() {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch (e) { audioCtx = null; }
    }
    return audioCtx;
  }
  function tone(freqs, dur, type) {
    const c = ac(); if (!c) return;
    const now = c.currentTime;
    freqs.forEach((f, i) => {
      const o = c.createOscillator(), g = c.createGain();
      o.type = type || "sine"; o.frequency.value = f;
      const t = now + i * 0.12;
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.25, t + 0.03);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      o.connect(g); g.connect(c.destination);
      o.start(t); o.stop(t + dur + 0.02);
    });
  }
  function successSound() { tone([523, 659, 784], 0.25, "triangle"); }
  function errorSound() { tone([240, 180], 0.22, "sine"); }

  // ---------- HELPERS ----------
  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }
  function $(id) { return document.getElementById(id); }

  // ---------- SCREENS ----------
  function showScreen(id) {
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    $(id).classList.add("active");
  }

  function buildStart() {
    const list = $("worldList");
    list.innerHTML = "";
    WORLDS.forEach((w, idx) => {
      const card = document.createElement("div");
      card.className = "world-card unlocked";
      card.innerHTML = '<div class="wc-emoji">' + w.emoji + '</div>' +
        '<div class="wc-info"><div class="wc-name">' + w.name + '</div>' +
        '<div class="wc-desc">' + w.enName + ' · ' + w.desc + '</div></div>' +
        '<div class="wc-lock">▶️</div>';
      card.addEventListener("click", function () { startWorld(idx); });
      list.appendChild(card);
    });
    LOCKED_WORLDS.forEach(function (w) {
      const card = document.createElement("div");
      card.className = "world-card locked";
      card.innerHTML = '<div class="wc-emoji">' + w.emoji + '</div>' +
        '<div class="wc-info"><div class="wc-name">' + w.name + '</div>' +
        '<div class="wc-desc">' + w.enName + ' · ' + w.desc + '</div></div>' +
        '<div class="wc-lock">🔒</div>';
      list.appendChild(card);
    });
  }

  function startWorld(idx) {
    if (ac() && audioCtx.state === "suspended") audioCtx.resume();
    state.world = idx; state.mission = 0; state.action = 0;
    showScreen("screen-play");
    renderAction();
  }

  function curMission() { return WORLDS[state.world].missions[state.mission]; }
  function curAction() { return curMission().actions[state.action]; }

  function renderAction() {
    clearHints();
    setNarrating(false);
    state.solved = false;
    const mission = curMission();
    const action = curAction();
    $("screen-play").style.background = mission.bg;
    updateNavArrows();

    // progress
    const totalActions = mission.actions.length;
    $("progressInfo").textContent =
      mission.name + " · משימה " + (state.mission + 1) + "/" + WORLDS[state.world].missions.length +
      " · פעולה " + (state.action + 1) + "/" + totalActions;
    $("progressFill").style.width = (((state.action) / totalActions) * 100) + "%";

    $("sentenceText").textContent = action.sentence;

    // objects
    const room = $("room");
    room.innerHTML = "";
    if (mission.imgRoom) {
      room.className = "room stage imgroom";
      room.style.background = mission.bg;
      const img = document.createElement("img");
      img.className = "bgimg";
      img.src = mission.bgImage;
      img.alt = "";
      room.appendChild(img);
      mission.objects.forEach(function (obj) {
        const b = document.createElement("button");
        b.className = "hotspot";
        b.style.left = obj.x + "%";
        b.style.top = obj.y + "%";
        b.style.width = obj.w + "%";
        b.style.height = obj.h + "%";
        b.setAttribute("data-key", obj.key);
        b.setAttribute("aria-label", obj.en);
        b.addEventListener("click", function () { onObjectClick(obj, b); });
        room.appendChild(b);
      });
    } else if (mission.scene) {
      room.className = "room stage";
      room.style.background = mission.bg;
      const bg = document.createElement("div");
      bg.className = "bg";
      bg.innerHTML = mission.sceneSVG;
      room.appendChild(bg);
      mission.objects.forEach(function (obj) {
        const b = document.createElement("button");
        b.className = "obj-scene";
        b.textContent = obj.emoji;
        b.style.left = obj.x + "%";
        b.style.top = obj.y + "%";
        b.style.fontSize = (obj.size || 2.6) + "rem";
        if (obj.fly) b.classList.add("fly");
        b.setAttribute("data-key", obj.key);
        b.setAttribute("aria-label", obj.en);
        b.addEventListener("click", function () { onObjectClick(obj, b); });
        room.appendChild(b);
      });
      if (mission.sceneFG) {
        const fg = document.createElement("div");
        fg.className = "fg";
        fg.innerHTML = mission.sceneFG;
        room.appendChild(fg);
      }
    } else {
      room.className = "room";
      room.style.background = mission.bg;
      state.shuffled = shuffle(mission.objects);
      state.shuffled.forEach(function (obj) {
        const b = document.createElement("button");
        b.className = "obj";
        b.textContent = obj.emoji;
        b.setAttribute("data-key", obj.key);
        b.setAttribute("aria-label", obj.en);
        b.addEventListener("click", function () { onObjectClick(obj, b); });
        room.appendChild(b);
      });
    }

    // auto-read the sentence once (scene locked while reading), then arm hints
    setTimeout(function () { narrate(action.sentence, 0.7); }, 350);
    armHints();
  }

  function onObjectClick(obj, el) {
    if (state.solved) return;
    const action = curAction();
    const tgt = action.target;
    const hit = Array.isArray(tgt) ? tgt.indexOf(obj.key) !== -1 : obj.key === tgt;
    if (hit) {
      state.solved = true;
      clearHints();
      el.classList.add("correct");
      successSound();
      launchConfetti();
      speak("Yes! You found the " + obj.en + "!", 0.8);
      $("progressFill").style.width =
        (((state.action + 1) / curMission().actions.length) * 100) + "%";
      setTimeout(nextAction, 2600);
    } else {
      el.classList.remove("wrong");
      void el.offsetWidth;
      el.classList.add("wrong");
      errorSound();
      speak(obj.en, 0.85);
    }
  }

  function nextAction() {
    const mission = curMission();
    if (state.action + 1 < mission.actions.length) {
      state.action++;
      renderAction();
    } else {
      missionComplete();
    }
  }

  // ---------- HINTS ----------
  function armHints() {
    hintTimer1 = setTimeout(function () {
      $("speakBtn").classList.add("flash");
      narrate(curAction().sentence, 0.65);
      hintTimer2 = setTimeout(function () {
        const room = $("room");
        const tgt = curAction().target;
        const key = Array.isArray(tgt) ? tgt[0] : tgt;
        const t = room.querySelector('[data-key="' + key + '"]');
        if (t) t.classList.add("hintpulse");
      }, 5000);
    }, 7000);
  }
  function clearHints() {
    if (hintTimer1) clearTimeout(hintTimer1);
    if (hintTimer2) clearTimeout(hintTimer2);
    hintTimer1 = hintTimer2 = null;
    $("speakBtn").classList.remove("flash");
    document.querySelectorAll(".hintpulse").forEach(function (e) { e.classList.remove("hintpulse"); });
  }

  // ---------- OVERLAYS ----------
  function showOverlay(emoji, titleHe, enLine, buttons) {
    $("ovEmoji").textContent = emoji;
    $("ovTitle").textContent = titleHe;
    $("ovEn").textContent = enLine;
    const bc = $("ovButtons");
    bc.innerHTML = "";
    buttons.forEach(function (b) {
      const el = document.createElement("button");
      el.className = "btn " + (b.cls || "");
      el.textContent = b.label;
      el.addEventListener("click", function () { hideOverlay(); b.fn(); });
      bc.appendChild(el);
    });
    $("overlay").classList.add("active");
    speak(enLine, 0.8);
  }
  function hideOverlay() { $("overlay").classList.remove("active"); }

  function missionComplete() {
    clearHints();
    const isLastMission = state.mission + 1 >= WORLDS[state.world].missions.length;
    if (isLastMission) {
      worldComplete();
    } else {
      showOverlay("🎉", "כל הכבוד! השלמת את המשימה הסודית!", "Great job! Mission complete!",
        [{ label: "למשימה הסודית הבאה", cls: "", fn: function () {
          state.mission++; state.action = 0; renderAction();
        } }]);
    }
  }

  function worldComplete() {
    const isLastWorld = state.world + 1 >= WORLDS.length;
    if (isLastWorld) {
      showOverlay("🏆", "כל הכבוד! סיימת את כל המשחק!", "Outstanding! You completed the entire game!",
        [
          { label: "שחק שוב", cls: "gold", fn: function () { startWorld(state.world); } },
          { label: "בחזרה לתפריט", cls: "secondary", fn: goHome }
        ]);
    } else {
      showOverlay("🌟", "כל הכבוד! השלמת את כל המשימות הסודיות בעולם!", "Excellent! You completed all the missions!",
        [{ label: "לעולם הבא", cls: "gold", fn: function () {
          state.world++; state.mission = 0; state.action = 0; renderAction();
        } }]);
    }
  }

  function goHome() {
    clearHints();
    setNarrating(false);
    if (window.speechSynthesis) window.speechSynthesis.cancel();
    showScreen("screen-start");
  }

  // ---------- CONFETTI ----------
  function launchConfetti() {
    const colors = ["#ffcf4f", "#4f8cff", "#7df9c0", "#ff7eb6", "#b58cff"];
    for (let i = 0; i < 18; i++) {
      const c = document.createElement("div");
      c.className = "confetti";
      c.style.left = (Math.random() * 100) + "vw";
      c.style.background = colors[i % colors.length];
      c.style.transform = "rotate(" + (Math.random() * 360) + "deg)";
      document.body.appendChild(c);
      const dur = 900 + Math.random() * 700;
      c.animate([
        { top: "-10px", opacity: 1 },
        { top: (60 + Math.random() * 30) + "vh", opacity: 0 }
      ], { duration: dur, easing: "ease-in" });
      setTimeout(function () { c.remove(); }, dur + 50);
    }
  }

  // ---------- EVENTS ----------
  $("speakBtn").addEventListener("click", function () {
    if (ac() && audioCtx.state === "suspended") audioCtx.resume();
    narrate(curAction().sentence, 0.65);
  });
  $("xlateBtn").addEventListener("click", function () {
    speakHe(curAction().he);
  });
  $("homeBtn").addEventListener("click", goHome);

  function jumpMission(delta) {
    const missions = WORLDS[state.world].missions;
    const target = state.mission + delta;
    if (target < 0 || target >= missions.length) return;
    state.mission = target;
    state.action = 0;
    renderAction();
  }
  function updateNavArrows() {
    const missions = WORLDS[state.world].missions;
    $("prevMissionBtn").disabled = state.mission <= 0;
    $("nextMissionBtn").disabled = state.mission >= missions.length - 1;
  }
  $("prevMissionBtn").addEventListener("click", function () { jumpMission(-1); });
  $("nextMissionBtn").addEventListener("click", function () { jumpMission(1); });

  // ---------- INIT ----------
  buildStart();
  // warm up voices
  if (window.speechSynthesis) { try { window.speechSynthesis.getVoices(); } catch (e) {} }
})();
</script>
</body>
</html>
