<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>צבעים עם הכלבלב 🐶 · Colors with the Puppy</title>
<script data-goatcounter="https://yaroneven.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Comic Sans MS', 'Segoe UI', system-ui, sans-serif;
    background: linear-gradient(135deg, #ffd194 0%, #f9a1bc 100%);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 16px;
  }
  .wrap { width: 100%; max-width: 480px; }
  .card {
    background: #fff;
    border-radius: 28px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.2);
    padding: 20px 20px 26px;
    text-align: center;
  }
  .title { font-size: 22px; font-weight: 700; color: #d2693e; margin-bottom: 2px; }
  .he-instr { font-size: 16px; color: #c0399b; font-weight: 700; margin: 4px 0 12px; }

  /* puppy */
  .puppy-stage { display: flex; justify-content: center; margin-bottom: 6px; }
  .puppy-svg { width: clamp(150px, 52vw, 200px); height: auto; }
  .removable { cursor: pointer; }

  /* rows */
  .row-block { margin-top: 14px; }
  .row-head {
    display: flex; align-items: center; justify-content: space-between;
    margin: 0 4px 8px;
  }
  .row-label { font-size: 16px; font-weight: 700; color: #8a4d2d; }
  .shuffle-btn {
    font-family: inherit; font-size: 14px; font-weight: 700;
    padding: 7px 12px; border: none; border-radius: 14px;
    background: #ffd9a8; color: #b9572f; cursor: pointer;
    transition: transform 0.1s, background 0.2s;
  }
  .shuffle-btn:hover { background: #ffcb8a; }
  .shuffle-btn:active { transform: scale(0.94); }

  .swatches { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .swatch {
    border: none; background: transparent; padding: 0; cursor: pointer;
    transition: transform 0.1s;
    display: flex; align-items: center; justify-content: center;
  }
  .swatch:active { transform: scale(0.92); }
  .swatch svg { width: 100%; height: auto; display: block; }

  .hint { margin-top: 16px; font-size: 14px; color: #999; min-height: 18px; }
  .footer { margin-top: 14px; font-size: 11px; color: #c9a; }
  a.home { color: #d2693e; text-decoration: none; font-weight: 700; }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="title">🐶 צבעים עם הכלבלב</div>
    <div class="he-instr">לחצו על וֶסט או כובע — והכלבלב יתלבש ויגיד את הצבע באנגלית!</div>

    <div class="puppy-stage">
      <svg class="puppy-svg" viewBox="0 0 200 250" xmlns="http://www.w3.org/2000/svg" aria-label="puppy">
        <!-- body -->
        <ellipse cx="100" cy="200" rx="52" ry="44" fill="#fff" stroke="#3a3a3a" stroke-width="4"/>
        <!-- vest (on body) -->
        <g id="vestOnPuppy" class="removable" style="display:none">
          <path id="vestShape" d="M70 172 L100 184 L130 172 L138 210 a40 40 0 0 1 -76 0 Z"
                fill="#ccc" stroke="#2c2c2c" stroke-width="3"/>
          <line x1="100" y1="184" x2="100" y2="240" stroke="#2c2c2c" stroke-width="2"/>
          <circle cx="100" cy="206" r="3.4" fill="#fff" stroke="#2c2c2c" stroke-width="1.5"/>
          <circle cx="100" cy="220" r="3.4" fill="#fff" stroke="#2c2c2c" stroke-width="1.5"/>
        </g>
        <!-- paws -->
        <ellipse cx="74" cy="240" rx="13" ry="9" fill="#fff" stroke="#3a3a3a" stroke-width="4"/>
        <ellipse cx="126" cy="240" rx="13" ry="9" fill="#fff" stroke="#3a3a3a" stroke-width="4"/>
        <!-- ears -->
        <path d="M48 96 q-22 6 -16 40 q4 20 28 14 Z" fill="#fff" stroke="#3a3a3a" stroke-width="4"/>
        <path d="M152 96 q22 6 16 40 q-4 20 -28 14 Z" fill="#fff" stroke="#3a3a3a" stroke-width="4"/>
        <!-- head -->
        <circle cx="100" cy="108" r="50" fill="#fff" stroke="#3a3a3a" stroke-width="4"/>
        <!-- eyes -->
        <circle cx="82" cy="100" r="6.5" fill="#3a3a3a"/>
        <circle cx="118" cy="100" r="6.5" fill="#3a3a3a"/>
        <circle cx="84" cy="98" r="2" fill="#fff"/>
        <circle cx="120" cy="98" r="2" fill="#fff"/>
        <!-- snout -->
        <ellipse cx="100" cy="126" rx="20" ry="15" fill="#f4f4f4" stroke="#3a3a3a" stroke-width="3"/>
        <ellipse cx="100" cy="120" rx="7" ry="5" fill="#3a3a3a"/>
        <path d="M100 125 v8 M100 133 q-8 6 -14 1 M100 133 q8 6 14 1" fill="none" stroke="#3a3a3a" stroke-width="2.5" stroke-linecap="round"/>
        <!-- hat (on head) -->
        <g id="hatOnPuppy" class="removable" style="display:none">
          <path id="hatShape" d="M64 70 q36 -34 72 0 Z" fill="#ccc" stroke="#2c2c2c" stroke-width="3"/>
          <path d="M58 70 h84 v8 h-84 Z" fill="#2c2c2c" opacity="0.85"/>
          <circle cx="100" cy="46" r="6" fill="#fff" stroke="#2c2c2c" stroke-width="2"/>
        </g>
      </svg>
    </div>

    <div class="row-block">
      <div class="row-head">
        <span class="row-label">🦺 וסטים · Vests</span>
        <button class="shuffle-btn" id="shuffleVest">🔀 ערבוב</button>
      </div>
      <div class="swatches" id="vestSwatches"></div>
    </div>

    <div class="row-block">
      <div class="row-head">
        <span class="row-label">🧢 כובעים · Hats</span>
        <button class="shuffle-btn" id="shuffleHat">🔀 ערבוב</button>
      </div>
      <div class="swatches" id="hatSwatches"></div>
    </div>

    <div class="hint" id="hint">טיפ: לחיצה על הכובע או הוסט שעל הכלבלב — מסירה אותו 😊</div>
    <div class="footer">תצוגה מקדימה · sandbox · <a class="home" href="../index.html" target="_top">דף הבית</a></div>
  </div>
</div>

<script>
"use strict";
const COLORS = [
  { name: "Red",    hex: "#e23b3b" },
  { name: "Blue",   hex: "#3b6fe2" },
  { name: "Green",  hex: "#2faa55" },
  { name: "Yellow", hex: "#f2c200" }
];

// color order for each row (indexes into COLORS). Start mismatched.
let vestOrder = [0, 1, 2, 3];
let hatOrder  = [2, 3, 0, 1];

// track consecutive shuffles on the same palette
let streakRow = null;   // 'vest' | 'hat'
let streakCount = 0;

const vestSwatches = document.getElementById("vestSwatches");
const hatSwatches  = document.getElementById("hatSwatches");
const hint = document.getElementById("hint");

const vestOnPuppy = document.getElementById("vestOnPuppy");
const hatOnPuppy  = document.getElementById("hatOnPuppy");
const vestShape   = document.getElementById("vestShape");
const hatShape    = document.getElementById("hatShape");

function speak(text) {
  try {
    if (!("speechSynthesis" in window)) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "en-US";
    u.rate = 0.85;
    u.pitch = 1.15;
    window.speechSynthesis.speak(u);
  } catch (e) { /* speech not available */ }
}

function vestIcon(hex) {
  return '<svg viewBox="0 0 60 60"><path d="M14 8 L30 16 L46 8 L52 40 a22 22 0 0 1 -44 0 Z" '
    + 'fill="' + hex + '" stroke="#2c2c2c" stroke-width="3"/>'
    + '<line x1="30" y1="16" x2="30" y2="52" stroke="#2c2c2c" stroke-width="2"/></svg>';
}
function hatIcon(hex) {
  return '<svg viewBox="0 0 60 60"><path d="M14 34 q16 -28 32 0 Z" fill="' + hex
    + '" stroke="#2c2c2c" stroke-width="3"/>'
    + '<path d="M8 34 h44 v7 h-44 Z" fill="#2c2c2c" opacity="0.85"/>'
    + '<circle cx="30" cy="14" r="5" fill="#fff" stroke="#2c2c2c" stroke-width="2"/></svg>';
}

function wearVest(color) {
  vestShape.setAttribute("fill", color.hex);
  vestOnPuppy.style.display = "";
  speak(color.name);
}
function wearHat(color) {
  hatShape.setAttribute("fill", color.hex);
  hatOnPuppy.style.display = "";
  speak(color.name);
}

vestOnPuppy.addEventListener("click", function () {
  vestOnPuppy.style.display = "none";
});
hatOnPuppy.addEventListener("click", function () {
  hatOnPuppy.style.display = "none";
});

function renderRow(container, order, iconFn, wearFn) {
  container.innerHTML = "";
  order.forEach(function (idx) {
    const color = COLORS[idx];
    const btn = document.createElement("button");
    btn.className = "swatch";
    btn.setAttribute("aria-label", color.name);
    btn.innerHTML = iconFn(color.hex);
    btn.addEventListener("click", function () { wearFn(color); });
    container.appendChild(btn);
  });
}

function renderVests() { renderRow(vestSwatches, vestOrder, vestIcon, wearVest); }
function renderHats()  { renderRow(hatSwatches,  hatOrder,  hatIcon,  wearHat); }

function sameOrder(a, b) {
  for (let i = 0; i < a.length; i++) { if (a[i] !== b[i]) return false; }
  return true;
}
function shuffled(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    const t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

function doShuffle(row) {
  const isVest = row === "vest";
  const myOrder = isVest ? vestOrder : hatOrder;
  const otherOrder = isVest ? hatOrder : vestOrder;

  if (streakRow === row) { streakCount++; } else { streakRow = row; streakCount = 1; }

  let next;
  if (streakCount >= 3 && !sameOrder(myOrder, otherOrder)) {
    // third shuffle in a row that still does not match -> force identical to the other row
    next = otherOrder.slice();
    streakCount = 0;
  } else {
    do { next = shuffled(myOrder); } while (sameOrder(next, myOrder));
  }

  if (isVest) { vestOrder = next; renderVests(); }
  else        { hatOrder = next;  renderHats(); }
}

document.getElementById("shuffleVest").addEventListener("click", function () { doShuffle("vest"); });
document.getElementById("shuffleHat").addEventListener("click", function () { doShuffle("hat"); });

renderVests();
renderHats();
</script>
</body>
</html>
