<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>מִשְׂחֲקֵי חֶשְׁבּוֹן לְכִתָּה ג'</title>
<script data-goatcounter="https://yaroneven.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
<style>
  :root{
    --bg1:#fff7e6; --bg2:#cdeffd; --card:#ffffff;
    --blue:#1f7fc4; --blue-d:#155f93; --yellow:#ffce3a; --green:#3fbf6b;
    --red:#e6604f; --purple:#a974d6; --ink:#243b53; --shadow:rgba(20,60,90,.18);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:"Segoe UI","Arial Hebrew",Arial,sans-serif;
    background:linear-gradient(160deg,var(--bg1) 0%,var(--bg2) 100%);
    color:var(--ink); min-height:100%;
    display:flex;flex-direction:column;align-items:center;
    -webkit-user-select:none;user-select:none;
  }
  header{width:100%;text-align:center;padding:14px 8px 4px;}
  .logo{
    display:inline-block;font-weight:900;font-size:clamp(28px,7vw,48px);
    color:var(--yellow);
    text-shadow:2px 2px 0 var(--red),4px 4px 0 var(--blue),0 6px 14px var(--shadow);
    letter-spacing:1px;
  }
  .logo small{display:block;font-size:.45em;color:var(--blue-d);text-shadow:none;font-weight:800;margin-top:4px;}
  main{width:100%;max-width:760px;flex:1;padding:8px 14px 30px;}

  /* ---- Menu ---- */
  .menu{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  @media(max-width:520px){.menu{grid-template-columns:1fr;}}
  .tile{
    background:var(--card);border:none;border-radius:22px;padding:20px 16px;
    box-shadow:0 6px 0 var(--shadow);cursor:pointer;text-align:center;
    transition:transform .08s,box-shadow .08s;
  }
  .tile:active{transform:translateY(4px);box-shadow:0 2px 0 var(--shadow);}
  .tile .emoji{font-size:40px;display:block;margin-bottom:8px;}
  .tile h3{margin:0 0 4px;font-size:clamp(18px,4.5vw,22px);}
  .tile p{margin:0;font-size:14px;color:#5b7b99;}
  .tile.c1{border-top:8px solid var(--blue);}
  .tile.c2{border-top:8px solid var(--green);}
  .tile.c3{border-top:8px solid var(--purple);}
  .tile.c4{border-top:8px solid var(--red);}
  .tile.c5{border-top:8px solid var(--yellow);}
  .tile.c6{border-top:8px solid #2bb3a3;}
  .tile.c7{border-top:8px solid #e87fb0;}
  .tile.c8{border-top:8px solid #d98a3a;}
  .tile.c9{border-top:8px solid #6c7bd6;}

  /* ---- Game screen ---- */
  .game{display:none;}
  .game.active{display:block;animation:pop .25s ease;}
  @keyframes pop{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
  .topbar{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:12px;}
  .btn{
    border:none;border-radius:16px;padding:10px 16px;font-size:16px;font-weight:800;
    font-family:inherit;cursor:pointer;box-shadow:0 4px 0 var(--shadow);color:#fff;
  }
  .btn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--shadow);}
  .btn.back{background:#8aa4bd;}
  .btn.blue{background:var(--blue);}
  .btn.green{background:var(--green);}
  .score{font-weight:900;font-size:18px;background:#fff;border-radius:16px;padding:8px 14px;box-shadow:0 4px 0 var(--shadow);}
  .score .star{color:var(--yellow);}
  .card{
    background:var(--card);border-radius:24px;padding:22px 18px;
    box-shadow:0 8px 0 var(--shadow);margin-bottom:14px;
  }
  .qtitle{font-size:clamp(20px,5vw,26px);font-weight:800;line-height:1.5;margin:0 0 14px;}
  .qtitle b{color:var(--blue-d);}
  .big-eq{font-size:clamp(30px,9vw,46px);font-weight:900;text-align:center;letter-spacing:2px;direction:ltr;}
  .items{font-size:30px;line-height:1.6;text-align:center;margin:10px 0;direction:ltr;}

  .inputs{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;align-items:flex-end;margin-top:6px;}
  .field{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .field label{font-size:15px;font-weight:700;color:#5b7b99;}
  input.num{
    width:96px;font-size:30px;text-align:center;padding:8px;border-radius:14px;
    border:3px solid #cfe0ee;font-family:inherit;font-weight:800;color:var(--ink);direction:ltr;
  }
  input.num:focus{outline:none;border-color:var(--blue);}

  .choices{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:6px;}
  .choice{
    background:#eef6fc;border:3px solid #d6e7f3;border-radius:18px;padding:16px;
    font-size:26px;font-weight:900;cursor:pointer;font-family:inherit;color:var(--ink);
    transition:transform .06s;
  }
  .choice:active{transform:scale(.97);}
  .choice.ok{background:#d8f5e2;border-color:var(--green);}
  .choice.no{background:#fcdcd6;border-color:var(--red);}

  .yn{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:8px;}
  .yn .seg{display:flex;flex-direction:column;align-items:center;gap:8px;background:#f4f9fd;border-radius:18px;padding:12px 14px;}
  .yn .seg b{font-size:17px;}

  .actions{display:flex;gap:12px;justify-content:center;margin-top:4px;}
  .feedback{min-height:34px;text-align:center;font-size:22px;font-weight:900;margin-top:10px;}
  .feedback.good{color:var(--green);}
  .feedback.bad{color:var(--red);}

  svg.pie{display:block;margin:0 auto;}
  .frac{display:inline-flex;flex-direction:column;align-items:center;line-height:1;direction:ltr;}
  .frac span{padding:0 6px;}
  .frac .top{border-bottom:3px solid currentColor;}

  footer{padding:10px;font-size:12px;color:#6b87a3;text-align:center;}
  .hidden{display:none!important;}

  .btn.help{background:var(--purple);}
  .explain{
    background:#f3ecfb;border:3px dashed #c9a8ec;border-radius:18px;
    padding:16px 18px;margin-top:12px;text-align:right;line-height:1.7;
  }
  .explain h4{margin:0 0 10px;font-size:20px;color:#7a3fb0;text-align:center;}
  .explain ol{margin:0;padding-inline-start:22px;}
  .explain li{margin-bottom:8px;font-size:17px;}
  .explain .calc{direction:ltr;display:inline-block;font-weight:900;background:#fff;
    border-radius:8px;padding:1px 8px;margin:0 2px;}

  /* interactive fraction coloring (g7) */
  svg.pieclick path{cursor:pointer;transition:fill .1s;}
  svg.pieclick path:hover{fill:#ffe79a;}
  svg.pieclick path.on{fill:#ff9d3a !important;}
  .frac-target{text-align:center;font-size:clamp(26px,8vw,40px);font-weight:900;margin:6px 0;}

  /* grouping game (g8) */
  .pile{min-height:54px;background:#fff7e6;border:3px dashed #e0c48a;border-radius:16px;
    padding:8px;text-align:center;font-size:28px;line-height:1.4;margin-bottom:12px;direction:ltr;}
  .plates{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;}
  .plate{flex:1 1 90px;min-width:84px;min-height:88px;background:#eef6fc;border:3px solid #cfe0ee;
    border-radius:18px;padding:8px 6px;cursor:pointer;text-align:center;transition:transform .06s;}
  .plate:active{transform:scale(.97);}
  .plate .cnt{font-size:13px;font-weight:800;color:#5b7b99;display:block;margin-bottom:4px;}
  .plate .stuff{font-size:24px;line-height:1.3;direction:ltr;min-height:30px;}
  .plate.full{border-color:var(--green);background:#e8f9ee;}
  .grp-tools{display:flex;gap:10px;justify-content:center;margin:10px 0 0;}
  .btn.mini{padding:7px 12px;font-size:14px;background:#8aa4bd;}

  /* multiplication table (g9) */
  .mtable{display:grid;gap:3px;justify-content:center;direction:ltr;margin:0 auto;overflow-x:auto;}
  .mcell{min-width:30px;height:30px;display:flex;align-items:center;justify-content:center;
    font-size:13px;font-weight:700;border-radius:6px;background:#eef6fc;color:#243b53;}
  .mcell.head{background:#1f7fc4;color:#fff;font-weight:900;}
  .mcell.corner{background:#155f93;color:#fff;}
  .mcell.blank{background:#ffce3a;color:#155f93;animation:blink 1s infinite;font-weight:900;}
  @keyframes blink{50%{background:#ffe179;}}
  .mopts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;}
</style>
</head>
<body>
<header>
  <a href="../" title="לְעֶמְוּד הַמִּשְׂחָקִים" style="display:inline-block;background:#fff;border-radius:14px;padding:5px 12px;font-size:20px;line-height:1;text-decoration:none;box-shadow:0 3px 0 rgba(20,60,90,.18);margin-bottom:8px;">⬆️🏠</a>
  <div class="logo">מִשְׂחֲקֵי חֶשְׁבּוֹן<small>לְכִתָּה ג'</small></div>
</header>

<main>
  <!-- MENU -->
  <section id="menu">
    <div class="menu">
      <button class="tile c1" onclick="openGame('g1')"><span class="emoji">🥜</span><h3>חִלּוּק עִם שְׁאֵרִית</h3><p>לְחַלֵּק לִקְבוּצוֹת – כַּמָּה נִשְׁאַר?</p></button>
      <button class="tile c2" onclick="openGame('g2')"><span class="emoji">✖️</span><h3>כֶּפֶל וְחִלּוּק עַד 10,000</h3><p>תַּרְגִּילֵי כֶּפֶל וְחִלּוּק</p></button>
      <button class="tile c3" onclick="openGame('g3')"><span class="emoji">🎈</span><h3>בְּעָיוֹת דּוּ-שְׁלַבִּיּוֹת</h3><p>בְּעָיוֹת מִלּוּלִיּוֹת בִּשְׁנֵי שְׁלַבִּים</p></button>
      <button class="tile c4" onclick="openGame('g4')"><span class="emoji">🍕</span><h3>שְׁבָרִים יְסוֹדִיִּים</h3><p>אֵיזֶה חֵלֶק צָבוּעַ?</p></button>
      <button class="tile c5" onclick="openGame('g5')"><span class="emoji">🔢</span><h3>סִימָנֵי הִתְחַלְּקוּת</h3><p>הִתְחַלְּקוּת בְּ-5 וּבְ-10</p></button>
      <button class="tile c6" onclick="openGame('g6')"><span class="emoji">🧮</span><h3>חִלּוּק עִם שְׁאֵרִית – בְּחִירָה</h3><p>בְּחַר אֶת הַתְּשׁוּבָה מִתּוֹךְ 4</p></button>
      <button class="tile c7" onclick="openGame('g7')"><span class="emoji">🎨</span><h3>צְבִיעַת שְׁבָרִים</h3><p>צְבַע אֶת הַחֲלָקִים לְפִי הַשֶּׁבֶר</p></button>
      <button class="tile c8" onclick="openGame('g8')"><span class="emoji">🍪</span><h3>חִלּוּק לִקְבוּצוֹת</h3><p>חַלֵּק שָׁוֶה בְּשָׁוֶה בֵּין הַצַּלָּחוֹת</p></button>
      <button class="tile c9" onclick="openGame('g9')"><span class="emoji">✳️</span><h3>לוּחַ הַכֶּפֶל</h3><p>הַשְׁלֵם אֶת הַמִּשְׁבֶּצֶת הַחֲסֵרָה</p></button>
    </div>
  </section>

  <!-- GAME TEMPLATE (shared shell created per game via JS) -->
  <section id="g1" class="game"></section>
  <section id="g2" class="game"></section>
  <section id="g3" class="game"></section>
  <section id="g4" class="game"></section>
  <section id="g5" class="game"></section>
  <section id="g6" class="game"></section>
  <section id="g7" class="game"></section>
  <section id="g8" class="game"></section>
  <section id="g9" class="game"></section>
</main>

<footer>מִשְׂחֲקֵי חֶשְׁבּוֹן לְכִתָּה ג'</footer>

<script>
/* ============ helpers ============ */
const $ = (s,r=document)=>r.querySelector(s);
function rnd(min,max){return Math.floor(Math.random()*(max-min+1))+min;}
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=rnd(0,i);[a[i],a[j]]=[a[j],a[i]];}return a;}

const GOOD=["יוֹפִי! 🎉","מְצֻיָּן! ⭐","כָּל הַכָּבוֹד! 👏","נָכוֹן מְאוֹד! 😃","אַלּוּף/ה! 🏆"];
const BAD =["כִּמְעַט! נַסּוּ שׁוּב 💪","לֹא נוֹרָא, אֶפְשָׁר עוֹד פַּעַם 🙂","הַתְשׁוּבָה הַנְּכוֹנָה: "];

/* tiny sound via WebAudio */
let actx;
function beep(freq,dur,type="sine"){
  try{actx=actx||new(window.AudioContext||window.webkitAudioContext)();
  const o=actx.createOscillator(),g=actx.createGain();
  o.type=type;o.frequency.value=freq;o.connect(g);g.connect(actx.destination);
  g.gain.setValueAtTime(.15,actx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+dur);
  o.start();o.stop(actx.currentTime+dur);}catch(e){}
}
function sndGood(){beep(660,.12);setTimeout(()=>beep(990,.16),110);}
function sndBad(){beep(200,.22,"square");}

/* shared fraction / pie utilities */
const FRAC_NAMES={2:"חֲצִי",3:"שְׁלִישׁ",4:"רְבִיעַ",5:"חֲמִישִׁית",6:"שִׁשִּׁית",7:"שְׁבִיעִית",8:"שְׁמִינִית",9:"תְּשִׁיעִית",10:"עֲשִׂירִית"};
function pieSVG(n,filled){
  const R=80,cx=100,cy=100;let p="";
  for(let i=0;i<n;i++){
    const a0=(i/n)*2*Math.PI - Math.PI/2, a1=((i+1)/n)*2*Math.PI - Math.PI/2;
    const x0=cx+R*Math.cos(a0),y0=cy+R*Math.sin(a0),x1=cx+R*Math.cos(a1),y1=cy+R*Math.sin(a1);
    const fill=i<filled?"#ffce3a":"#ffffff";
    p+=`<path d="M${cx},${cy} L${x0.toFixed(1)},${y0.toFixed(1)} A${R},${R} 0 0,1 ${x1.toFixed(1)},${y1.toFixed(1)} Z" fill="${fill}" stroke="#243b53" stroke-width="2"/>`;
  }
  return `<svg class="pie" width="200" height="200" viewBox="0 0 200 200">${p}</svg>`;
}
function fracHTML(num,den){return `<span class="frac"><span class="top">${num}</span><span>${den}</span></span>`;}
function pieClickSVG(n){
  const R=80,cx=100,cy=100;let p="";
  for(let i=0;i<n;i++){
    const a0=(i/n)*2*Math.PI - Math.PI/2, a1=((i+1)/n)*2*Math.PI - Math.PI/2;
    const x0=cx+R*Math.cos(a0),y0=cy+R*Math.sin(a0),x1=cx+R*Math.cos(a1),y1=cy+R*Math.sin(a1);
    p+=`<path id="g7-s${i}" d="M${cx},${cy} L${x0.toFixed(1)},${y0.toFixed(1)} A${R},${R} 0 0,1 ${x1.toFixed(1)},${y1.toFixed(1)} Z" fill="#ffffff" stroke="#243b53" stroke-width="2" onclick="games.g7.toggle(${i})"/>`;
  }
  return `<svg class="pie pieclick" width="200" height="200" viewBox="0 0 200 200">${p}</svg>`;
}

/* ============ Base Game class ============ */
class Game {
  constructor(id){ this.id=id; this.score=0; this.streak=0; this.cur=null; this.lastSig=null; }
  shell(title,bodyHTML){
    const id=this.id;
    $('#'+id).innerHTML=`
      <div class="topbar">
        <button class="btn back" onclick="goMenu()">⬅ תַּפְרִיט</button>
        <div class="score">⭐ <span id="${id}-score">${this.score}</span></div>
      </div>
      <h2 class="qtitle" style="text-align:center">${title}</h2>
      <div class="card" id="${id}-body">${bodyHTML}</div>
      <div class="feedback" id="${id}-fb"></div>
      <div class="actions">
        <button class="btn green" id="${id}-check" onclick="games['${id}'].check()">בְּדִיקָה ✓</button>
        <button class="btn help" id="${id}-help" onclick="games['${id}'].toggleExplain()">🔍 אֵיךְ פּוֹתְרִים?</button>
        <button class="btn blue hidden" id="${id}-next" onclick="games['${id}'].next()">הַבָּא ➜</button>
      </div>
      <div class="explain hidden" id="${id}-explain"></div>`;
  }
  toggleExplain(){
    const box=$('#'+this.id+'-explain');
    if(box.classList.contains('hidden')){
      box.innerHTML=this.explain();
      box.classList.remove('hidden');
      $('#'+this.id+'-help').textContent='🙈 הַסְתֵּר הֶסְבֵּר';
    }else{
      box.classList.add('hidden');
      $('#'+this.id+'-help').textContent='🔍 אֵיךְ פּוֹתְרִים?';
    }
  }
  addScore(n){ this.score+=n; this.streak = n>0?this.streak+1:0; $('#'+this.id+'-score').textContent=this.score; }
  setFb(ok,msg){ const fb=$('#'+this.id+'-fb'); fb.className='feedback '+(ok?'good':'bad'); fb.textContent=msg; }
  showNext(){ $('#'+this.id+'-check').classList.add('hidden'); $('#'+this.id+'-next').classList.remove('hidden'); }
  showCheck(){ $('#'+this.id+'-check').classList.remove('hidden'); $('#'+this.id+'-next').classList.add('hidden'); }
  next(){
    let sig, tries=0;
    do { this.gen(); sig=JSON.stringify(this.cur); tries++; }
    while(sig===this.lastSig && tries<10);
    this.lastSig=sig;
  }
  /* overridden per game */
  gen(){}
  check(){}
  explain(){ return ''; }
}

/* ============ GAME 1: division with remainder ============ */
const G1_ITEMS=[
  {n:"אֱגוֹזִים",e:"🥜",cont:"צַלָּחוֹת",contS:"בְּכָל צַלַּחַת"},
  {n:"עֻגִיּוֹת",e:"🍪",cont:"קֻפְסָאוֹת",contS:"בְּכָל קֻפְסָה"},
  {n:"פְּרָחִים",e:"🌸",cont:"אֲגַרְטָלִים",contS:"בְּכָל אֲגַרְטָל"},
  {n:"כַּדּוּרִים",e:"⚽",cont:"רְשָׁתוֹת",contS:"בְּכָל רֶשֶׁת"},
  {n:"תַּפּוּחִים",e:"🍎",cont:"סַלִּים",contS:"בְּכָל סַל"},
];
class G1 extends Game {
  gen(){
    const it=pick(G1_ITEMS);
    const group=rnd(3,6);
    const q=rnd(2,8), r=rnd(1,group-1);
    const total=group*q+r;
    this.cur={q,r,total,group,item:it};
    const dots=it.e.repeat(Math.min(total,24))+(total>24?" …":"");
    this.shell(`חִלּוּק עִם שְׁאֵרִית 🥜`,`
      <p class="qtitle">מְחַלְּקִים <b>${total} ${it.n}</b> לְ${it.cont},<br>
      <b>${group} ${it.n}</b> ${it.contS}.</p>
      <div class="items">${dots}</div>
      <div class="big-eq">${total} : ${group} = ?</div>
      <div class="inputs">
        <div class="field"><label>כַּמָּה קְבוּצוֹת מְלֵאוֹת?</label><input class="num" id="g1-q" type="number" inputmode="numeric"></div>
        <div class="field"><label>כַּמָּה נִשְׁאֲרוּ? (שְׁאֵרִית)</label><input class="num" id="g1-r" type="number" inputmode="numeric"></div>
      </div>`);
    this.showCheck();
  }
  check(){
    const c=this.cur;
    const q=parseInt($('#g1-q').value,10), r=parseInt($('#g1-r').value,10);
    if(isNaN(q)||isNaN(r)){this.setFb(false,"מַלְּאוּ אֶת שְׁנֵי הַמִּסְפָּרִים 🙂");return;}
    if(q===c.q && r===c.r){this.addScore(10);sndGood();this.setFb(true,pick(GOOD));this.showNext();}

      <li>אָז יֵשׁ <b>${c.q} קְבוּצוֹת מְלֵאוֹת</b>.</li>

/* ============ GAME 2: multiplication & division up to 10,000 ============ */
class G2 extends Game {
  gen(){
    let a,b,ans,op,sym;
    if(Math.random()<0.5){ // multiplication, product <= 10000
      a=rnd(20,99)* (Math.random()<.5?1:10); // up to ~990
      b=rnd(2,9);
      if(a*b>10000){a=rnd(11,99);b=rnd(2,9);}
      ans=a*b; op='×'; sym='×';
    }else{ // division, exact
      b=rnd(2,9); ans=rnd(20,900); a=b*ans; op='÷'; sym=':';
      if(a>10000){a=rnd(2,9); ans=rnd(20,400); b=ans; var t=a; a=t*ans;}
    }
    this.cur={ans,a,b,sym,op};
    this.shell(`כֶּפֶל וְחִלּוּק עַד 10,000 ✖️`,`
      <p class="qtitle" style="text-align:center">פִּתְרוּ אֶת הַתַּרְגִּיל:</p>
      <div class="big-eq">${a} ${sym} ${b} = ?</div>
      <div class="inputs"><div class="field"><label>הַתְּשׁוּבָה</label>
        <input class="num" id="g2-ans" type="number" inputmode="numeric" style="width:140px"></div></div>`);
    this.showCheck();
  }
  check(){
    const c=this.cur;
    const v=parseInt($('#g2-ans').value,10);
    if(isNaN(v)){this.setFb(false,"כִּתְבוּ אֶת הַתְּשׁוּבָה 🙂");return;}
    if(v===c.ans){this.addScore(10);sndGood();this.setFb(true,pick(GOOD));this.showNext();}
    else{sndBad();this.setFb(false,`הַתְשׁוּבָה הַנְּכוֹנָה: ${c.ans}`);}
  }
  explain(){
    const c=this.cur;
    if(c.op==='×'){
      const big=Math.max(c.a,c.b), sml=Math.min(c.a,c.b);
      const tens=Math.floor(big/10)*10, ones=big%10;
      let steps=`<li>זֶהוּ תַּרְגִּיל <b>כֶּפֶל</b>: <span class="calc">${c.a} × ${c.b}</span>.</li>`;
      if(tens>0){
        steps+=`<li>נְפָרֵק אֶת ${big} לְ-${tens}+${ones} וְנַכְפִּיל כָּל חֵלֶק בְּ-${sml}:</li>
        <li>${tens} × ${sml} = <span class="calc">${tens*sml}</span></li>
        <li>${ones} × ${sml} = <span class="calc">${ones*sml}</span></li>
        <li>מְחַבְּרִים: ${tens*sml} + ${ones*sml} = <span class="calc">${c.ans}</span></li>`;
      }else{
        steps+=`<li>${c.a} × ${c.b} = <span class="calc">${c.ans}</span></li>`;
      }
      return `<h4>אֵיךְ פּוֹתְרִים? ✖️</h4><ol>${steps}<li>הַתְּשׁוּבָה: <span class="calc">${c.ans}</span></li></ol>`;
    }else{
      return `<h4>אֵיךְ פּוֹתְרִים? ➗</h4><ol>
        <li>זֶהוּ תַּרְגִּיל <b>חִלּוּק</b>: <span class="calc">${c.a} : ${c.b}</span>.</li>
        <li>נִשְׁאַל: בְּכַמָּה צָרִיךְ לְהַכְפִּיל אֶת ${c.b} כְּדֵי לְקַבֵּל ${c.a}?</li>
        <li>בּוֹדְקִים: ${c.b} × ${c.ans} = <span class="calc">${c.a}</span> ✔</li>
        <li>לָכֵן <span class="calc">${c.a} : ${c.b} = ${c.ans}</span></li>
      </ol>`;
    }
  }
}

      steps:[`שָׁלָב 1 – כַּמָּה בָּלוֹנִים בַּחֲבִילוֹת? מַכְפִּילִים: ${packs} × ${each} = <span class="calc">${packs*each}</span>`,
             `שָׁלָב 2 – מוֹסִיפִים אֶת מַה שֶּׁהֵבִיאוּ הַחֲבֵרִים: ${packs*each} + ${extra} = <span class="calc">${ans}</span>`]};
  },
  ()=>{ // had, bought boxes*each, total

             `שָׁלָב 2 – מוֹסִיפִים לְמַה שֶּׁכְּבָר הָיָה: ${start} + ${boxes*each} = <span class="calc">${ans}</span>`]};
  },
  ()=>{ // bought total, gave away
    const name=pick(NAMES),bags=rnd(3,6),each=rnd(4,9),gave=rnd(2,8);
    const ans=bags*each-gave;
    return{ans,emoji:"📒",text:`${name} אָסַף ${bags} קֻפְסָאוֹת שֶׁל מַחְבָּרוֹת, בְּכָל קֻפְסָה ${each} מַחְבָּרוֹת. ${name} נָתַן ${gave} מַחְבָּרוֹת לְחָבֵר. כַּמָּה מַחְבָּרוֹת נִשְׁאֲרוּ?`,
      steps:[`שָׁלָב 1 – כַּמָּה מַחְבָּרוֹת בַּקֻּפְסָאוֹת? ${bags} × ${each} = <span class="calc">${bags*each}</span>`,
             `שָׁלָב 2 – מוֹרִידִים אֶת מַה שֶּׁנָּתַן: ${bags*each} − ${gave} = <span class="calc">${ans}</span>`]};
  },
  ()=>{ // total split groups (two step: subtract then divide)
    const name=pick(NAMES),g=rnd(3,6),per=rnd(3,7),left=rnd(1,5)*g;
    const total=g*per+left, ans=g;
    return{ans,emoji:"🍬",text:`לְ${name} ${total} סֻכָּרִיּוֹת. הוּא שָׂם ${per} סֻכָּרִיּוֹת בְּכָל שַׂקִּית וְנִשְׁאֲרוּ לוֹ ${left} סֻכָּרִיּוֹת בַּצַּד. כַּמָּה שַׂקִּיּוֹת מְלֵאוֹת הֵכִין?`,

  },
];

/* ============ GAME 6: division with remainder – 4 options, elimination ============ */
class G6 extends Game {
  gen(){
    const divisor=rnd(3,6), q=rnd(2,9), r=rnd(1,divisor-1), total=divisor*q+r;
    const opts=[{q,r}];
    const add=o=>{ if(o.q>=0&&o.r>=0 && !opts.some(x=>x.q===o.q&&x.r===o.r)) opts.push(o); };
    const cands=shuffle([{q,r:r+divisor},{q:q+1,r},{q:q-1,r},{q,r:Math.max(0,r-1)},{q:q+1,r:Math.max(0,r-1)},{q:q-1,r:r+1}]);
    for(const c of cands){ if(opts.length>=4) break; add(c); }
    const options=shuffle(opts).slice(0,4);
    const correctIdx=options.findIndex(o=>o.q===q&&o.r===r);
    this.cur={total,divisor,q,r,options,correctIdx};
    this.shell(`חִלּוּק עִם שְׁאֵרִית – בְּחִירָה 🧮`,`
      <p class="qtitle" style="text-align:center">אֵיזוֹ תְּשׁוּבָה נְכוֹנָה?</p>
      <div class="big-eq">${total} : ${divisor} = ?</div>
      <div class="choices" id="g6-choices">
        ${options.map((o,i)=>`<button class="choice" data-i="${i}" onclick="games.g6.pickAns(this,${i})">${o.q} <span style="font-size:15px;color:#5b7b99">(שְׁאֵרִית ${o.r})</span></button>`).join("")}
      </div>`);
    $('#g6-check').classList.add('hidden'); $('#g6-next').classList.add('hidden');
  }
  pickAns(btn,i){
    if(!$('#g6-next').classList.contains('hidden')) return;
    const c=this.cur;
    document.querySelectorAll('#g6-choices .choice').forEach(b=>b.style.pointerEvents='none');
    if(i===c.correctIdx){btn.classList.add('ok');this.addScore(10);sndGood();this.setFb(true,pick(GOOD));}
    else{btn.classList.add('no');sndBad();
      document.querySelector(`#g6-choices .choice[data-i="${c.correctIdx}"]`).classList.add('ok');
      const o=c.options[c.correctIdx];
      this.setFb(false,`הַתְּשׁוּבָה: ${o.q} וְשָׁאֵרִית ${o.r}`);}
    $('#g6-next').classList.remove('hidden');
  }
  explain(){
    const c=this.cur;
    let items='';
    c.options.forEach((o,i)=>{
      if(i===c.correctIdx){
        items+=`<li>✅ <b>${o.q} (שְׁאֵרִית ${o.r})</b> – נָכוֹן! כִּי <span class="calc">${o.q}×${c.divisor}+${o.r}=${c.total}</span>, וְהַשְּׁאֵרִית ${o.r} קְטַנָּה מִ-${c.divisor}.</li>`;
      }else if(o.r>=c.divisor){
        items+=`<li>❌ ${o.q} (שְׁאֵרִית ${o.r}) – פָּסוּל: הַשְּׁאֵרִית חַיֶּבֶת לִהְיוֹת קְטַנָּה מִ-${c.divisor}, וְ-${o.r} גְּדוֹלָה מִדַּי.</li>`;
      }else{
        items+=`<li>❌ ${o.q} (שְׁאֵרִית ${o.r}) – פָּסוּל: <span class="calc">${o.q}×${c.divisor}+${o.r}=${o.q*c.divisor+o.r}</span> וְלֹא ${c.total}.</li>`;
      }
    });
    return `<h4>נִפְסֹל אֶת הַשְּׁגוּיוֹת 🧮</h4>
      <p style="text-align:center;margin:0 0 8px">בּוֹדְקִים כָּל תְּשׁוּבָה: הַמַּכְפֵּלָה צְרִיכָה לָתֵת ${c.total}, וְהַשְּׁאֵרִית קְטַנָּה מִ-${c.divisor}.</p>
      <ol>${items}</ol>`;
  }
}

/* ============ GAME 7: color the fraction ============ */
class G7 extends Game {
  gen(){
    const den=rnd(3,8), num=rnd(1,den-1);
    this.cur={num,den,sel:new Array(den).fill(false)};
    this.shell(`צְבִיעַת שְׁבָרִים 🎨`,`
      <p style="text-align:center;margin:0 0 10px"><a href="../fractions-lesson/" style="display:inline-block;background:#a974d6;color:#fff;text-decoration:none;border-radius:14px;padding:9px 16px;font-weight:800;box-shadow:0 4px 0 rgba(20,60,90,.18)">📖 לֹא בְּטוּחִים? לִלְמֹד שְׁבָרִים קֹדֶם</a></p>
      <p class="qtitle" style="text-align:center">צִבְעוּ אֶת הֶחֲלָקִים כָּךְ שֶׁיִּתְקַבֵּל הַשֶּׁבֶר:</p>
      <div class="frac-target">${fracHTML(num,den)}</div>
      <p style="text-align:center;color:#5b7b99;margin:0 0 8px">הַקִּישׁוּ עַל מְשֻׁלָּשׁ כְּדֵי לִצְבֹּעַ אוֹתוֹ (וְשׁוּב כְּדֵי לְבַטֵּל).</p>
      ${pieClickSVG(den)}`);
    this.showCheck();
  }
  toggle(i){
    if(!$('#g7-next').classList.contains('hidden')) return;
    const c=this.cur; c.sel[i]=!c.sel[i];
    $('#g7-s'+i).classList.toggle('on',c.sel[i]);
  }
  check(){
    const c=this.cur;
    const cnt=c.sel.filter(Boolean).length;
    if(cnt===c.num){this.addScore(10);sndGood();this.setFb(true,pick(GOOD));this.showNext();}
    else{sndBad();this.setFb(false,`צָבַעְתֶּם ${cnt} חֲלָקִים, צְרִיכִים ${c.num}`);}
  }
  explain(){
    const c=this.cur;
    return `<h4>אֵיךְ צוֹבְעִים? 🎨</h4><ol>
      <li>בַּשֶּׁבֶר ${fracHTML(c.num,c.den)} הַמִּסְפָּר לְמַטָּה (הַמְּכַנֶּה) הוּא <b>${c.den}</b> – לְכַמָּה חֲלָקִים שָׁוִים חֻלַּק הָעִגּוּל.</li>
      <li>הַמִּסְפָּר לְמַעְלָה (הַמּוֹנֶה) הוּא <b>${c.num}</b> – כַּמָּה חֲלָקִים צוֹבְעִים.</li>
      <li>לָכֵן צוֹבְעִים <b>${c.num}</b> מְשֻׁלָּשִׁים מִתּוֹךְ ${c.den}.</li>
    </ol>`;
  }
}

/* ============ GAME 8: division without remainder – share into groups ============ */
const G8_ITEMS=[{n:"עֻגִיּוֹת",e:"🍪"},{n:"כַּדּוּרִים",e:"⚽"},{n:"סֻכָּרִיּוֹת",e:"🍬"},{n:"תַּפּוּחִים",e:"🍎"}];
class G8 extends Game {
  gen(){
    const groups=rnd(2,5), per=rnd(2,6), total=groups*per, item=pick(G8_ITEMS);
    this.cur={total,groups,per,item,dist:new Array(groups).fill(0),placed:0};
    this.shell(`חִלּוּק לִקְבוּצוֹת 🍪`,`
      <p class="qtitle" style="text-align:center">חַלְּקוּ <b>${total} ${item.n}</b> שָׁוֶה בְּשָׁוֶה בֵּין <b>${groups} צַלָּחוֹת</b>.<br>
      <span style="font-size:16px;color:#5b7b99">הַקִּישׁוּ עַל צַלַּחַת כְּדֵי לְהוֹסִיף ${item.e}</span></p>
      <div id="g8-area"></div>
      <div class="grp-tools"><button class="btn mini" onclick="games.g8.reset()">↺ הַתְחֵל מֵחָדָשׁ</button></div>`);
    this.render(); this.showCheck();
  }
  render(){
    const c=this.cur, left=c.total-c.placed;
    const pile = left>0 ? c.item.e.repeat(left) : "✓ הָעֲרֵמָה רֵיקָה";
    const plates = c.dist.map((cnt,i)=>`
      <div class="plate ${cnt===c.per?'full':''}" onclick="games.g8.add(${i})">
        <span class="cnt">צַלַּחַת ${i+1}: ${cnt}</span>
        <div class="stuff">${c.item.e.repeat(cnt)}</div>
      </div>`).join("");
    $('#g8-area').innerHTML=`<div class="pile">בָּעֲרֵמָה: ${pile}</div><div class="plates">${plates}</div>`;
  }
  add(i){
    if(!$('#g8-next').classList.contains('hidden')) return;
    const c=this.cur;
    if(c.placed>=c.total) return;
    c.dist[i]++; c.placed++; beep(520,.05); this.render();
  }
  reset(){
    const c=this.cur; c.dist=new Array(c.groups).fill(0); c.placed=0; $('#g8-fb').textContent=''; this.render();
  }
  check(){
    const c=this.cur;
    if(c.placed<c.total){this.setFb(false,`עוֹד נִשְׁאֲרוּ ${c.total-c.placed} בָּעֲרֵמָה`);return;}
    if(c.dist.every(x=>x===c.per)){this.addScore(10);sndGood();this.setFb(true,pick(GOOD));this.showNext();}
    else{sndBad();this.setFb(false,`הַחֲלוּקָה לֹא שָׁוָה – בְּכָל צַלַּחַת צָרִיךְ ${c.per}`);}
  }
  explain(){
    const c=this.cur;
    return `<h4>אֵיךְ מְחַלְּקִים? 🍪</h4><ol>
      <li>יֵשׁ <b>${c.total} ${c.item.n}</b> וְצָרִיךְ לְחַלֵּק לְ-<b>${c.groups}</b> צַלָּחוֹת שָׁווֹת.</li>
      <li>זֶהוּ תַּרְגִּיל חִלּוּק: <span class="calc">${c.total} : ${c.groups}</span></li>
      <li>שָׂמִים ${c.item.e} אֶחָד בְּכָל צַלַּחַת בְּתוֹרוֹ, עַד שֶׁהָעֲרֵמָה נִגְמֶרֶת.</li>
      <li>בְּכָל צַלַּחַת יִהְיוּ <b>${c.per}</b>, כִּי <span class="calc">${c.groups}×${c.per}=${c.total}</span>.</li>
    </ol>`;
  }
}

/* ============ GAME 9: interactive multiplication table ============ */
class G9 extends Game {
  gen(){
    const N=10, r=rnd(1,N), col=rnd(1,N), prod=r*col;
    this.cur={N,r,c:col,prod};
    let grid=`<div class="mcell corner">×</div>`;
    for(let c=1;c<=N;c++) grid+=`<div class="mcell head">${c}</div>`;
    for(let row=1;row<=N;row++){
      grid+=`<div class="mcell head">${row}</div>`;
      for(let c=1;c<=N;c++){
        if(row===r && c===col) grid+=`<div class="mcell blank" id="g9-blank">?</div>`;
        else grid+=`<div class="mcell">${row*c}</div>`;
      }
    }
    const opts=new Set([prod]);
    const cand=[prod+r,prod-r,prod+col,prod-col,(r+1)*col,r*(col+1),prod+1,prod-1];
    for(const v of shuffle(cand)){ if(opts.size>=4) break; if(v>0) opts.add(v); }
    const options=shuffle([...opts]).slice(0,4);
    this.cur.options=options;
    this.shell(`לוּחַ הַכֶּפֶל ✳️`,`
      <p class="qtitle" style="text-align:center">אֵיזֶה מִסְפָּר חָסֵר בַּמִּשְׁבֶּצֶת הַצְּהֻבָּה?<br>
      <span style="font-size:18px;color:#5b7b99">(${r} × ${col})</span></p>
      <div class="mtable" style="grid-template-columns:repeat(${N+1},minmax(28px,1fr))">${grid}</div>
      <div class="mopts" id="g9-opts">
        ${options.map(v=>`<button class="choice" data-v="${v}" onclick="games.g9.pickAns(this,${v})">${v}</button>`).join("")}
      </div>`);
    $('#g9-check').classList.add('hidden'); $('#g9-next').classList.add('hidden');
  }
  pickAns(btn,v){
    if(!$('#g9-next').classList.contains('hidden')) return;
    const c=this.cur;
    document.querySelectorAll('#g9-opts .choice').forEach(b=>b.style.pointerEvents='none');
    const blank=$('#g9-blank');
    if(v===c.prod){btn.classList.add('ok');blank.textContent=c.prod;blank.style.background='#d8f5e2';
      this.addScore(10);sndGood();this.setFb(true,pick(GOOD));}
    else{btn.classList.add('no');sndBad();blank.textContent=c.prod;
      document.querySelector(`#g9-opts .choice[data-v="${c.prod}"]`).classList.add('ok');
      this.setFb(false,`${c.r} × ${c.c} = ${c.prod}`);}
    $('#g9-next').classList.remove('hidden');
  }
  explain(){
    const c=this.cur;
    const seq=[]; for(let i=1;i<=c.c;i++) seq.push(c.r*i);
    return `<h4>אֵיךְ מַשְׁלִימִים? ✳️</h4><ol>
      <li>הַמִּשְׁבֶּצֶת נִמְצֵאת בְּשׁוּרָה ${c.r} וּבְעַמּוּדָה ${c.c}, אָז צָרִיךְ <span class="calc">${c.r} × ${c.c}</span>.</li>
      <li>אֶפְשָׁר לִסְפֹּר בִּקְפִיצוֹת שֶׁל ${c.r}: ${seq.join(", ")}.</li>
      <li>הַתְּשׁוּבָה: <span class="calc">${c.r} × ${c.c} = ${c.prod}</span></li>
    </ol>`;
  }
}

/* ============ registry, navigation & init ============ */
const games={
  g1:new G1('g1'), g2:new G2('g2'), g3:new G3('g3'), g4:new G4('g4'), g5:new G5('g5'),
  g6:new G6('g6'), g7:new G7('g7'), g8:new G8('g8'), g9:new G9('g9')
};

function goMenu(){
  document.querySelectorAll('.game').forEach(g=>g.classList.remove('active'));
  $('#menu').style.display='block';
}
function openGame(id){
  $('#menu').style.display='none';
  document.querySelectorAll('.game').forEach(g=>g.classList.remove('active'));
  $('#'+id).classList.add('active');
  games[id].next();           // generate first question
}

Object.values(games).forEach(g=>{ /* games ready */ });
document.addEventListener('keydown',e=>{
  if(e.key!=='Enter')return;
  const g=document.querySelector('.game.active'); if(!g)return;
  const id=g.id;
  if(!games[id])return;
  if(!$('#'+id+'-next').classList.contains('hidden')) games[id].next();
  else games[id].check();
});
</script>
