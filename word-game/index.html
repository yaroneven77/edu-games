<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Word Games! 🎉</title>
<script data-goatcounter="https://yaroneven.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Comic Sans MS', 'Segoe UI', system-ui, sans-serif;
    background: linear-gradient(135deg, #74ebd5 0%, #9face6 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .wrap { width: 100%; max-width: 480px; }

  /* Tabs */
  .tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 12px;
  }
  .tab {
    flex: 1 1 30%;
    font-family: inherit;
    font-size: 13.5px;
    font-weight: bold;
    padding: 10px 6px;
    border: none;
    border-radius: 14px 14px 0 0;
    background: rgba(255,255,255,0.5);
    color: #3b3b6d;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  .tab.active { background: #fff; color: #5a4ad1; }
  .tab:active { transform: scale(0.97); }

  .card {
    background: #fff;
    border-radius: 28px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.2);
    padding: 24px 24px 30px;
    text-align: center;
  }
  .game { display: none; }
  .game.active { display: block; }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    font-size: 20px;
    font-weight: bold;
    color: #555;
  }
  .score { color: #2e9e5b; }
  .streak { color: #e8870c; }
  h1 { font-size: 22px; color: #5a4ad1; margin-bottom: 12px; }
  .he-instr { font-size: 20px; color: #c0399b; font-weight: 700; margin: -6px 0 14px; text-align: center; }

  .picrow {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin: 6px 0 14px;
  }
  .picture {
    font-size: 110px;
    line-height: 1.1;
    user-select: none;
  }
  .wordtext {
    font-size: 64px;
    font-weight: bold;
    color: #4338ca;
    letter-spacing: 3px;
    text-transform: lowercase;
    user-select: none;
  }
  .hebrew {
    min-height: 30px;
    font-size: 26px;
    font-weight: bold;
    color: #0e7490;
    margin: -4px 0 10px;
    direction: rtl;
  }
  .pop { animation: pop 0.4s ease; }
  @keyframes pop {
    0% { transform: scale(0.4); opacity: 0; }
    70% { transform: scale(1.12); }
    100% { transform: scale(1); opacity: 1; }
  }
  .speak {
    font-size: 28px;
    width: 56px;
    height: 56px;
    min-width: 56px;
    border: none;
    border-radius: 50%;
    background: #ffd24d;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    transition: transform 0.1s, background 0.2s;
  }
  .speak:hover { background: #ffc721; }
  .speak:active { transform: scale(0.9); }
  .heb-btn {
    background: #7dd3fc;
    font-size: 22px;
    font-weight: bold;
    color: #0c4a6e;
  }
  .heb-btn:hover { background: #38bdf8; }

  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 8px;
  }
  .options button {
    font-family: inherit;
    font-size: 22px;
    font-weight: bold;
    padding: 14px 10px;
    border: none;
    border-radius: 18px;
    background: #f0f1ff;
    color: #4338ca;
    cursor: pointer;
    transition: transform 0.1s, background 0.2s;
    text-transform: capitalize;
  }
  .options.pics button { font-size: 44px; }
  .options button:hover:not(:disabled) { background: #e0e2ff; transform: translateY(-2px); }
  .options button:active:not(:disabled) { transform: scale(0.96); }
  .options button.correct { background: #34d399 !important; color: #fff; animation: shake-good 0.4s; }
  .options button.wrong { background: #f87171 !important; color: #fff; animation: shake-bad 0.4s; }
  .options button:disabled { cursor: default; opacity: 0.85; }
  @keyframes shake-good { 0%,100%{transform:scale(1);} 50%{transform:scale(1.08);} }
  @keyframes shake-bad { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-6px);} 75%{transform:translateX(6px);} }

  .feedback { min-height: 34px; font-size: 24px; font-weight: bold; margin-top: 14px; }
  .next {
    margin-top: 12px;
    font-family: inherit;
    font-size: 20px;
    font-weight: bold;
    padding: 12px 32px;
    border: none;
    border-radius: 16px;
    background: #5a4ad1;
    color: #fff;
    cursor: pointer;
    visibility: hidden;
  }
  .next:hover { background: #4838b8; }

  /* ---- new game styles ---- */
  .options button.letter { font-size: 30px; letter-spacing: 1px; text-transform: none; }
  .sentence {
    font-size: 27px;
    font-weight: bold;
    color: #4338ca;
    line-height: 1.25;
  }
  .blankword {
    font-size: 50px;
    font-weight: bold;
    color: #4338ca;
    letter-spacing: 6px;
    margin: -2px 0 8px;
    user-select: none;
    text-transform: lowercase;
  }
  .blankword .blank { color: #dc2626; }
  .memboard {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin: 6px 0 4px;
  }
  .memcard {
    aspect-ratio: 1 / 1;
    font-family: inherit;
    font-size: 30px;
    font-weight: bold;
    border: none;
    border-radius: 14px;
    background: #c7d2fe;
    color: #4338ca;
    cursor: pointer;
    transition: transform 0.1s, background 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    text-transform: lowercase;
  }
  .memcard.word { font-size: 22px; }
  .memcard.flipped { background: #fff7d6; }
  .memcard.matched { background: #34d399; color: #fff; cursor: default; }
  .memcard:active:not(.matched) { transform: scale(0.94); }
  .read-img {
    width: 100%;
    max-width: 420px;
    border-radius: 18px;
    box-shadow: 0 8px 22px rgba(0,0,0,0.15);
    margin: 4px auto 12px;
    display: block;
  }
  .read-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-top: 10px;
  }
  .rnav {
    font-family: inherit;
    font-size: 16px;
    font-weight: bold;
    padding: 12px 14px;
    border: none;
    border-radius: 16px;
    background: #c7d2fe;
    color: #4338ca;
    cursor: pointer;
    transition: transform 0.1s, background 0.2s;
  }
  .rnav:hover:not(:disabled) { background: #a5b4fc; }
  .rnav:active:not(:disabled) { transform: scale(0.95); }
  .rnav:disabled { opacity: 0.4; cursor: default; }
  .read-count { font-size: 18px; font-weight: bold; color: #555; }
</style>
</head>
<body>
  <a href="../" title="Back to all games" style="position:fixed;top:10px;left:10px;z-index:9999;background:#fff;border-radius:14px;padding:6px 11px;font-size:20px;line-height:1;text-decoration:none;box-shadow:0 3px 0 rgba(20,60,90,.18);">⬆️🏠</a>
  <div class="wrap">
    <div class="tabs">
      <button class="tab active" data-tab="g1">🖼️ Picture → Word</button>
      <button class="tab" data-tab="g2">📖 Word → Picture</button>

        <div class="picrow">

          <button class="speak heb-btn" id="g2-hebtn" title="Hebrew translation">עב</button>
        </div>
        <div class="hebrew" id="g2-he"></div>
        <div class="options pics" id="g2-options"></div>
        <div class="feedback" id="g2-feedback"></div>
        <button class="next" id="g2-next">Next ➡️</button>
      </div>

      <!-- GAME 3: see picture, pick the first letter/sound -->
      <div class="game" id="g3">
        <div class="topbar">
          <span class="score">⭐ <span id="g3-score">0</span></span>

        <div class="he-instr" dir="rtl">עם איזה צליל זה מתחיל?</div>
        <div class="picrow">
          <div class="picture" id="g3-stim">❓</div>
          <button class="speak" id="g3-speak" title="Say the word">🔊</button>
          <button class="speak heb-btn" id="g3-hebtn" title="Hebrew translation">עב</button>
        </div>
        <div class="hebrew" id="g3-he"></div>
        <div class="options" id="g3-options"></div>
        <div class="feedback" id="g3-feedback"></div>
        <button class="next" id="g3-next">Next ➡️</button>
      </div>

      <!-- GAME 4: picture + word with a blank, pick the missing first letter -->
      <div class="game" id="g4">
        <div class="topbar">
          <span class="score">⭐ <span id="g4-score">0</span></span>

        </div>
        <div class="he-instr" dir="rtl">בחר את האות החסרה!</div>
        <div class="picrow">
          <div class="picture" id="g4-stim">❓</div>

          <button class="speak heb-btn" id="g4-hebtn" title="Hebrew translation">עב</button>
        </div>
        <div class="blankword" id="g4-word"></div>
        <div class="hebrew" id="g4-he"></div>
        <div class="options" id="g4-options"></div>
        <div class="feedback" id="g4-feedback"></div>
        <button class="next" id="g4-next">Next ➡️</button>
      </div>

      <!-- GAME 5: read the sentence, pick the matching picture -->
      <div class="game" id="g5">
        <div class="topbar">
          <span class="score">⭐ <span id="g5-score">0</span></span>
          <span class="streak">🔥 <span id="g5-streak">0</span></span>
        </div>
        <div class="he-instr" dir="rtl">תקראו את זה, ואז תבחרו את התמונה!</div>
        <div class="picrow">
          <div class="sentence" id="g5-stim">…</div>
          <button class="speak" id="g5-speak" title="Say the sentence">🔊</button>
          <button class="speak heb-btn" id="g5-hebtn" title="Hebrew translation">עב</button>
        </div>
        <div class="hebrew" id="g5-he"></div>
        <div class="options pics" id="g5-options"></div>
        <div class="feedback" id="g5-feedback"></div>

      <!-- GAME 6: memory match (word card ↔ picture card) -->
      <div class="game" id="g6">
        <div class="topbar">
          <span class="score">✅ <span id="g6-score">0</span>/6</span>
          <span class="streak">🔁 <span id="g6-moves">0</span></span>

      <!-- GAME 7: reading -- read the sentence, look at the picture -->
      <div class="game" id="g7">

        <img class="read-img" id="g7-img" alt="reading picture" />
        <div class="picrow">
          <button class="speak" id="g7-speak" title="Read it">🔊</button>
          <button class="speak heb-btn" id="g7-hebtn" title="Hebrew translation">עב</button>
        </div>
        <div class="hebrew" id="g7-he"></div>
        <div class="read-nav">
          <button class="rnav" id="g7-prev">⬅️ הַקּוֹדֵם</button>

<script>
  /* ---------- word lists ---------- */
  // Game 1: picture-guessing words
  const WORDS1 = {
    "dog":"🐕","old":"👴","hungry":"😋","sun":"☀️","goat":"🐐",
    "bear":"🐻","young":"👶","milkshake":"🥤","moon":"🌙","soft":"🧸",
    "horse":"🐴","slow":"🐢","hippo":"🦛","bird":"🐦","sleeping":"😴",
    "duck":"🦆","fast":"🏃","deer":"🦌","dolphin":"🐬","sandals":"👡",
    "giraffe":"🦒","fat":"🐷","thin":"🦴","sheep":"🐑","spider":"🕷️",
    "elevator":"🛗","lion":"🦁","small":"🐜","big":"🐘","cow":"🐮",
    "mouse":"🐭","monkey":"🐵","happy":"😄","snail":"🐌","elephant":"🐘","cactus":"🌵"
  };

  // Game 2: phonics / reading words (duplicate "hen" removed)
  const WORDS2 = {
    "dad":"👨","mad":"😠","bag":"🎒","gap":"🕳️","beg":"🙏",
    "cat":"🐱","pam":"👩","egg":"🥚","hat":"🎩","can":"🥫",
    "ten":"🔟","pan":"🍳","bad":"👎","pen":"🖊️","has":"🤲",
    "pat":"🙋","cab":"🚕","dan":"👦","hen":"🐔","the":"🔤",
    "nat":"🧒","ant":"🐜","sad":"😢","tag":"🏷️","is":"🟰",
    "nag":"😤","bat":"🦇","net":"🥅","in":"📥","bed":"🛏️",
    "tap":"🚰","sat":"🪑","pet":"🐶","on":"🔛"
  };

  /* ---------- Hebrew translations ---------- */
  const HE = {
    // game 1
    "dog":"כֶּלֶב","old":"זָקֵן","hungry":"רָעֵב","sun":"שֶׁמֶשׁ","goat":"עֵז",
    "bear":"דֹּב","young":"צָעִיר","milkshake":"מִילְקְשֵׁייק","moon":"יָרֵחַ","soft":"רַךְ",
    "horse":"סוּס","slow":"אִיטִי","hippo":"הִיפּוֹפּוֹטָם","bird":"צִיפּוֹר","sleeping":"יָשֵׁן",
    "duck":"בַּרְוָוז","fast":"מָהִיר","deer":"אַיָּל","dolphin":"דּוֹלְפִין","sandals":"סַנְדָּלִים",
    "giraffe":"גִּ'ירָפָה","fat":"שָׁמֵן","thin":"רָזֶה","sheep":"כִּבְשָׂה","spider":"עַכָּבִישׁ",
    "elevator":"מַעֲלִית","lion":"אַרְיֵה","small":"קָטָן","big":"גָּדוֹל","cow":"פָּרָה",
    "mouse":"עַכְבָּר","monkey":"קוֹף","happy":"שָׂמֵחַ","snail":"חִלָּזוֹן","elephant":"פִּיל","cactus":"קַקְטוּס",
    // game 2
    "dad":"אַבָּא","mad":"כּוֹעֵס","bag":"תִּיק","gap":"רֶוַוח","beg":"לְהִתְחַנֵּן",
    "cat":"חָתוּל","pam":"פַּאם","egg":"בֵּיצָה","hat":"כּוֹבַע","can":"פַּחִית",
    "ten":"עֶשֶׂר","pan":"מַחֲבַת","bad":"רַע","pen":"עֵט","has":"יֵשׁ לוֹ",
    "pat":"פַּט","cab":"מוֹנִית","dan":"דָּן","hen":"תַּרְנְגוֹלֶת","the":"הַ (תָּוִית)",
    "nat":"נָט","ant":"נְמָלָה","sad":"עָצוּב","tag":"תָּוִית","is":"זֶה/הוּא",
    "nag":"לְנַדְנֵד","bat":"עֲטַלֵּף","net":"רֶשֶׁת","in":"בְּתוֹךְ","bed":"מִיטָה",
    "tap":"בֶּרֶז","sat":"יָשַׁב","pet":"חַיַּת מַחְמָד","on":"עַל"
  };

  /* ---------- shared helpers ---------- */
  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  let femaleVoice = null;
  let hebrewVoice = null;
  function loadVoice() {
    const voices = window.speechSynthesis.getVoices();
    const prefer = ["Google US English","Microsoft Aria","Microsoft Zira","Microsoft Jenny",
      "Samantha","Karen","Moira","Tessa","Female"];
    const en = voices.filter(v => /en/i.test(v.lang));
    for (const name of prefer) {
      const m = en.find(v => v.name.includes(name));
      if (m) { femaleVoice = m; break; }
    }
    if (!femaleVoice) femaleVoice = en[0] || voices[0] || null;
    // Hebrew voice (Carmit on Apple devices, or any he-* voice)
    hebrewVoice = voices.find(v => v.name.includes("Carmit")) ||
                  voices.find(v => /^he/i.test(v.lang)) || null;
  }
  if ("speechSynthesis" in window) {
    loadVoice();
    window.speechSynthesis.onvoiceschanged = loadVoice;
  }
  function say(word) {
    if (!word || !("speechSynthesis" in window)) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(word);
    u.lang = "en-US";
    u.rate = 0.85;
    u.pitch = 1.25;
    if (femaleVoice) u.voice = femaleVoice;
    window.speechSynthesis.speak(u);
  }
  function sayHebrew(word) {
    const heb = HE[word];
    if (!heb || !("speechSynthesis" in window)) return;
    window.speechSynthesis.cancel();
    // strip vowel niqqud for cleaner TTS
    const plain = heb.replace(/[\u0591-\u05C7]/g, "");
    const u = new SpeechSynthesisUtterance(plain);
    u.lang = "he-IL";
    u.rate = 0.85;
    if (hebrewVoice) u.voice = hebrewVoice;
    window.speechSynthesis.speak(u);
  }

  /* ---------- generic game factory ----------
     mode "pic2word": stimulus = emoji picture, options = words
     mode "word2pic": stimulus = word text,    options = emoji pictures
  */
  function makeGame(id, words, mode) {
    const keys = Object.keys(words);
    const stimEl = document.getElementById(id + "-stim");
    const optsEl = document.getElementById(id + "-options");
    const fbEl = document.getElementById(id + "-feedback");
    const nextBtn = document.getElementById(id + "-next");
    const scoreEl = document.getElementById(id + "-score");
    const streakEl = document.getElementById(id + "-streak");
    const speakBtn = document.getElementById(id + "-speak");
    const hebBtn = document.getElementById(id + "-hebtn");
    const heEl = document.getElementById(id + "-he");

    let score = 0, streak = 0, answer = "", tries = 3;

    function pick(n, exclude) {
      return shuffle(keys.filter(w => w !== exclude)).slice(0, n);
    }

    function newRound() {
      answer = keys[Math.floor(Math.random() * keys.length)];
      tries = 3;

      // show stimulus
      stimEl.textContent = (mode === "pic2word") ? words[answer] : answer;
      stimEl.classList.remove("pop");
      void stimEl.offsetWidth;
      stimEl.classList.add("pop");

      const choices = shuffle([answer, ...pick(5, answer)]);
      optsEl.innerHTML = "";
      choices.forEach(word => {
        const btn = document.createElement("button");
        // option label: word text, or its emoji picture
        btn.textContent = (mode === "pic2word") ? word : words[word];
        btn.dataset.word = word;
        btn.onclick = () => choose(btn, word);
        optsEl.appendChild(btn);
      });

      fbEl.textContent = "❤️❤️❤️  3 tries";
      fbEl.style.color = "#e8870c";
      heEl.textContent = "";

  function speakHebrewText(text) {
    if (!text || !("speechSynthesis" in window)) return;
    window.speechSynthesis.cancel();
    const plain = text.replace(/[\u0591-\u05C7]/g, "");
    const u = new SpeechSynthesisUtterance(plain);
    u.lang = "he-IL";
    u.rate = 0.85;
    if (hebrewVoice) u.voice = hebrewVoice;
    window.speechSynthesis.speak(u);
  }

  /* ---------- generic multiple-choice game (3 tries, score, streak) ----------
     opts: { keys, render(answer), answerOf(answer), makeOptions(answer),
             speakOf(answer), heOf(answer) -> {text, speak} }            */
  function makeChoiceGame(id, opts) {
    const keys = opts.keys;
    const optsEl = document.getElementById(id + "-options");
    const fbEl = document.getElementById(id + "-feedback");
    const nextBtn = document.getElementById(id + "-next");
    const scoreEl = document.getElementById(id + "-score");
    const streakEl = document.getElementById(id + "-streak");
    const speakBtn = document.getElementById(id + "-speak");
    const hebBtn = document.getElementById(id + "-hebtn");
    const heEl = document.getElementById(id + "-he");

    const maxTries = opts.tries || 3;
    let score = 0, streak = 0, tries = maxTries, answer = "", answerVal = "";

    function newRound() {
      answer = keys[Math.floor(Math.random() * keys.length)];
      tries = maxTries;
      opts.render(answer);
      answerVal = opts.answerOf(answer);

      const choices = opts.makeOptions(answer);
      optsEl.innerHTML = "";
      choices.forEach(c => {
        const b = document.createElement("button");
        b.textContent = c.label;
        if (c.cls) b.classList.add(c.cls);
        b.dataset.val = c.value;
        b.onclick = () => choose(b, c.value);
        optsEl.appendChild(b);
      });

      fbEl.textContent = "❤️".repeat(maxTries) + "  " + maxTries + " tries";
      fbEl.style.color = "#e8870c";
      if (heEl) heEl.textContent = "";
      nextBtn.style.visibility = "hidden";
    }

    function choose(btn, val) {
      if (val === answerVal) {
        optsEl.querySelectorAll("button").forEach(b => b.disabled = true);
        btn.classList.add("correct");
        score++; streak++;
        fbEl.textContent = "🎉 Correct! Great job!";
        fbEl.style.color = "#2e9e5b";
        scoreEl.textContent = score;
        streakEl.textContent = streak;
        nextBtn.style.visibility = "visible";
        if (opts.onCorrect) opts.onCorrect(answer);
        return;
      }
      btn.classList.add("wrong");
      btn.disabled = true;
      tries--;
      if (tries > 0) {
        fbEl.textContent = "❤️".repeat(tries) + "🤍".repeat(maxTries - tries) + "  Try again!";
        fbEl.style.color = "#e8870c";
      } else {
        streak = 0;
        streakEl.textContent = streak;
        optsEl.querySelectorAll("button").forEach(b => {
          b.disabled = true;
          if (b.dataset.val === String(answerVal)) b.classList.add("correct");
        });
        fbEl.textContent = "❌ The answer is shown 👇";
        fbEl.style.color = "#dc2626";
        nextBtn.style.visibility = "visible";
      }
    }

    nextBtn.onclick = newRound;
    speakBtn.onclick = () => say(opts.speakOf(answer));
    hebBtn.onclick = () => {
      const h = opts.heOf(answer);
      if (heEl) heEl.textContent = h.text || "—";
      if (h.speak) speakHebrewText(h.speak);
    };
    newRound();
  }

  /* ---------- memory match game ---------- */
  function makeMemory(id) {
    const board = document.getElementById(id + "-board");
    const fb = document.getElementById(id + "-feedback");
    const again = document.getElementById(id + "-next");
    const scoreEl = document.getElementById(id + "-score");
    const movesEl = document.getElementById(id + "-moves");
    let pairs = {}, keys = [];
    let first = null, lock = false, matched = 0, moves = 0;

    function build() {
      // pick 6 random pairs from the pool each time
      keys = shuffle(Object.keys(MEM_POOL)).slice(0, 6);
      pairs = {};
      keys.forEach(k => pairs[k] = MEM_POOL[k]);

      matched = 0; moves = 0; first = null; lock = false;
      scoreEl.textContent = 0;
      movesEl.textContent = 0;
      fb.textContent = "Find all 6 pairs! 🃏";
      fb.style.color = "#e8870c";
      again.style.visibility = "hidden";

      const cards = [];
      keys.forEach(k => {
        cards.push({ k, face: k, type: "word" });
        cards.push({ k, face: pairs[k], type: "pic" });
      });
      shuffle(cards);

      board.innerHTML = "";
      cards.forEach(c => {
        const b = document.createElement("button");
        b.className = "memcard " + c.type;
        b.dataset.k = c.k;
        b.dataset.face = c.face;
        b.textContent = "❓";
        b.onclick = () => flip(b);
        board.appendChild(b);
      });
    }

    function flip(b) {
      if (lock || b.classList.contains("flipped") || b.classList.contains("matched")) return;
      b.classList.add("flipped");
      b.textContent = b.dataset.face;
      if (b.classList.contains("word")) say(b.dataset.k);

      if (!first) { first = b; return; }

      moves++;
      movesEl.textContent = moves;

      if (first.dataset.k === b.dataset.k && first !== b) {
        first.classList.add("matched");
        b.classList.add("matched");
        matched++;
        scoreEl.textContent = matched;
        first = null;
        if (matched === keys.length) {
          fb.textContent = "🎉 You found them all!";
          fb.style.color = "#2e9e5b";
          again.style.visibility = "visible";
        }
      } else {
        lock = true;
        const a = first;
        first = null;
        setTimeout(() => {
          [a, b].forEach(x => { x.classList.remove("flipped"); x.textContent = "❓"; });
          lock = false;
        }, 850);
      }
    }

    again.onclick = build;
    build();
  }

  ];

  function makeReading(id) {
    const imgEl = document.getElementById(id + "-img");
    const countEl = document.getElementById(id + "-count");
    const heEl = document.getElementById(id + "-he");
    const speakBtn = document.getElementById(id + "-speak");
    const hebBtn = document.getElementById(id + "-hebtn");
    const prevBtn = document.getElementById(id + "-prev");
    const fwdBtn = document.getElementById(id + "-fwd");
    let order = shuffle(READING.map((_, i) => i));
    let pos = 0;
    function current() { return READING[order[pos]]; }
    function show() {
      const r = current();
      imgEl.src = r.img;
      popEl(imgEl);
      countEl.textContent = (pos + 1) + " / " + READING.length;
      if (heEl) heEl.textContent = "";
      prevBtn.disabled = (pos === 0);
      fwdBtn.disabled = false;
    }
    speakBtn.onclick = () => say(current().en);
    hebBtn.onclick = () => {
      if (heEl) heEl.textContent = current().he;
      speakHebrewText(current().he);
    };
    prevBtn.onclick = () => { if (pos > 0) { pos--; show(); } };
    fwdBtn.onclick = () => {
      pos++;
      if (pos >= READING.length) { order = shuffle(READING.map((_, i) => i)); pos = 0; }
      show();
    };
    show();
  }

  /* ---------- per-game analytics ---------- */
  const GAME_NAMES = {
    g1: "Picture-to-Word",
    g2: "Word-to-Picture",
    g3: "First-Sound",
    g4: "Missing-Letter",
    g5: "Sentences",
    g6: "Memory",
    g7: "Reading"
  };
  function trackGame(tabId) {
    const name = GAME_NAMES[tabId] || tabId;
    if (window.goatcounter && window.goatcounter.count) {
      window.goatcounter.count({
        path: "game/" + tabId + "-" + name,
        title: "Game: " + name,
        event: true
      });
    }
  }

  /* ---------- tab switching ---------- */
  document.querySelectorAll(".tab").forEach(tab => {
    tab.onclick = () => {
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      document.querySelectorAll(".game").forEach(g => g.classList.remove("active"));
      tab.classList.add("active");
      document.getElementById(tab.dataset.tab).classList.add("active");
      if ("speechSynthesis" in window) window.speechSynthesis.cancel();
      trackGame(tab.dataset.tab);
    };
  });

  // Count the first game (shown by default on load)
  window.addEventListener("load", () => setTimeout(() => trackGame("g1"), 800));

  /* ---------- start all games ---------- */
  makeGame("g1", WORDS1, "pic2word");
  makeGame("g2", WORDS2, "word2pic");

  // Game 3: First Sound — see a picture, pick the starting letter
  const FIRST_KEYS = Object.keys(PICS);
  const FIRST_LETTERS = [...new Set(FIRST_KEYS.map(k => k[0]))];
  makeChoiceGame("g3", {
    keys: FIRST_KEYS,
    tries: 2,
    render(a) { const el = document.getElementById("g3-stim"); el.textContent = PICS[a]; popEl(el); },
    answerOf(a) { return a[0]; },
    makeOptions(a) {
      const correct = a[0];
      const distract = shuffle(FIRST_LETTERS.filter(l => l !== correct)).slice(0, 3);
      return shuffle([correct, ...distract]).map(l => ({
        label: l.toUpperCase() + l, value: l, cls: "letter"
      }));
    },
    speakOf(a) { return a; },
    heOf(a) { return { text: (HE[a] || "—") + "  —  " + a, speak: HE[a] || a }; }
  });

  // Game 4: Missing Letter — picture + word with a blank first letter
  const CVC_KEYS = Object.keys(CVC);
  const LETTER_POOL = ["c","b","d","h","m","n","p","s","t","g","r","f"];
  makeChoiceGame("g4", {
    keys: CVC_KEYS,
    tries: 2,
    render(a) {
      const el = document.getElementById("g4-stim");
      el.textContent = CVC[a];
      popEl(el);
      const rest = a.slice(1).split("").join(" ");
      document.getElementById("g4-word").innerHTML = '<span class="blank">_</span> ' + rest;
    },
    answerOf(a) { return a[0]; },
    makeOptions(a) {
      const correct = a[0];
      const distract = shuffle(LETTER_POOL.filter(l => l !== correct)).slice(0, 3);
      return shuffle([correct, ...distract]).map(l => ({
        label: l.toUpperCase(), value: l, cls: "letter"
      }));
    },
    speakOf(a) { return a; },
    heOf(a) { return { text: (HE[a] || "—") + "  —  " + a, speak: HE[a] || a }; },
    onCorrect(a) {
      document.getElementById("g4-word").innerHTML =
        '<span class="blank">' + a[0].toUpperCase() + '</span> ' + a.slice(1).split("").join(" ");
      const heEl = document.getElementById("g4-he");
      if (heEl) heEl.textContent = (HE[a] || "—") + "  —  " + a;
    }
  });

  // Game 5: Sentences — read the sentence, pick the matching picture
  const SENT_KEYS = Object.keys(SENTENCES);
  makeChoiceGame("g5", {
    keys: SENT_KEYS,
    render(a) { const el = document.getElementById("g5-stim"); el.textContent = a; popEl(el); },
    answerOf(a) { return SENTENCES[a]; },
    makeOptions(a) {
      const correct = SENTENCES[a];
      const others = shuffle(SENT_KEYS.filter(s => s !== a).map(s => SENTENCES[s])).slice(0, 5);
      return shuffle([correct, ...others]).map(emoji => ({ label: emoji, value: emoji }));
    },
    speakOf(a) { return a; },
    heOf(a) { return { text: SENT_HE[a] || "—", speak: SENT_HE[a] || "" }; }
  });

  // Game 6: Memory
  makeMemory("g6");

  makeReading("g7");
</script>
