<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>צבעים עם הכלבלב 🐶 · Colors with the Puppy</title>
<script data-goatcounter="https://yaroneven.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Comic Sans MS', 'Segoe UI', system-ui, sans-serif;
    background: linear-gradient(135deg, #ffd194 0%, #f9a1bc 100%);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 16px;
  }
  .wrap { width: 100%; max-width: 480px; }
  .card {
    background: #fff;
    border-radius: 28px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.2);
    padding: 20px 20px 26px;
    text-align: center;
  }
  .title { font-size: 22px; font-weight: 700; color: #d2693e; margin-bottom: 2px; }
  .he-instr { font-size: 16px; color: #c0399b; font-weight: 700; margin: 4px 0 12px; }

  .puppy-stage { display: flex; justify-content: center; margin-bottom: 6px; }
  .puppy-svg { width: clamp(160px, 56vw, 210px); height: auto; }
  .removable { cursor: pointer; }

  .row-block { margin-top: 14px; }
  .row-head {
    display: flex; align-items: center; justify-content: space-between;
    margin: 0 4px 8px;
  }
  .row-label { font-size: 16px; font-weight: 700; color: #8a4d2d; }
  .shuffle-btn {
    font-family: inherit; font-size: 14px; font-weight: 700;
    padding: 7px 12px; border: none; border-radius: 14px;
    background: #ffd9a8; color: #b9572f; cursor: pointer;
    transition: transform 0.1s, background 0.2s;
  }
  .shuffle-btn:hover { background: #ffcb8a; }
  .shuffle-btn:active { transform: scale(0.94); }

  .swatches { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .swatch {
    border: none; background: transparent; padding: 0; cursor: pointer;
    transition: transform 0.1s;
    display: flex; align-items: center; justify-content: center;
  }
  .swatch:active { transform: scale(0.92); }
  .swatch svg { width: 100%; height: auto; display: block; }

  .hint { margin-top: 16px; font-size: 14px; color: #999; min-height: 18px; }
  .footer { margin-top: 14px; font-size: 11px; color: #c9a; }
  a.home { color: #d2693e; text-decoration: none; font-weight: 700; }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="title">🐶 צבעים עם הכלבלב</div>
    <div class="he-instr">לחצו על וֶסט או כובע — והכלבלב יתלבש ויגיד את הצבע באנגלית!</div>

    <div class="puppy-stage">
      <svg class="puppy-svg" viewBox="0 0 200 250" xmlns="http://www.w3.org/2000/svg" aria-label="rescue puppy">
        <defs>
          <!-- paw print emblem -->
          <g id="paw">
            <ellipse cx="0" cy="2.4" rx="3.4" ry="2.8" fill="#2b2b2b"/>
            <circle cx="-3.4" cy="-1.6" r="1.5" fill="#2b2b2b"/>
            <circle cx="-1.1" cy="-3.4" r="1.5" fill="#2b2b2b"/>
            <circle cx="1.1"  cy="-3.4" r="1.5" fill="#2b2b2b"/>
            <circle cx="3.4"  cy="-1.6" r="1.5" fill="#2b2b2b"/>
          </g>
        </defs>

        <!-- ===== sitting body (line art, black & white) ===== -->
        <path d="M64 168 q-14 30 -10 60 h92 q4 -30 -10 -60 Z" fill="#fff" stroke="#2b2b2b" stroke-width="4" stroke-linejoin="round"/>
        <!-- front legs / paws -->
        <rect x="70" y="206" width="22" height="30" rx="11" fill="#fff" stroke="#2b2b2b" stroke-width="4"/>
        <rect x="108" y="206" width="22" height="30" rx="11" fill="#fff" stroke="#2b2b2b" stroke-width="4"/>
        <line x1="81" y1="226" x2="81" y2="234" stroke="#2b2b2b" stroke-width="2.4"/>
        <line x1="119" y1="226" x2="119" y2="234" stroke="#2b2b2b" stroke-width="2.4"/>

        <!-- ===== vest (Paw Patrol style) ===== -->
        <g id="vestOnPuppy" class="removable" style="display:none">
          <!-- shoulder straps (inherit group color) -->
          <path d="M78 150 q22 -10 44 0 l-3 14 q-19 -8 -38 0 Z" stroke="#1f2937" stroke-width="2.5" stroke-linejoin="round"/>
          <!-- main vest panel (inherit group color) -->
          <path d="M72 162 q28 -12 56 0 q10 26 6 50 h-68 q-4 -24 6 -50 Z" stroke="#1f2937" stroke-width="3" stroke-linejoin="round"/>
          <!-- reflective stripe -->
          <path d="M70 196 h60" fill="none" stroke="#f8fafc" stroke-width="3" opacity="0.85"/>
          <!-- badge: white circle + paw -->
          <circle cx="100" cy="180" r="13" fill="#fff" stroke="#1f2937" stroke-width="2.5"/>
          <use href="#paw" x="100" y="181" />
        </g>

        <!-- ===== ears (upright, Chase-style) ===== -->
        <path d="M62 78 L46 20 Q72 34 84 64 Z" fill="#fff" stroke="#2b2b2b" stroke-width="4" stroke-linejoin="round"/>
        <path d="M138 78 L154 20 Q128 34 116 64 Z" fill="#fff" stroke="#2b2b2b" stroke-width="4" stroke-linejoin="round"/>
        <path d="M64 70 L54 36 Q70 46 78 64 Z" fill="#2b2b2b" opacity="0.18"/>
        <path d="M136 70 L146 36 Q130 46 122 64 Z" fill="#2b2b2b" opacity="0.18"/>

        <!-- ===== head ===== -->
        <circle cx="100" cy="100" r="48" fill="#fff" stroke="#2b2b2b" stroke-width="4"/>
        <!-- eyebrows (shepherd markings) -->
        <path d="M74 86 q9 -7 18 -1" fill="none" stroke="#2b2b2b" stroke-width="3.2" stroke-linecap="round"/>
        <path d="M126 86 q-9 -7 -18 -1" fill="none" stroke="#2b2b2b" stroke-width="3.2" stroke-linecap="round"/>
        <!-- eyes -->
        <circle cx="84" cy="98" r="7" fill="#2b2b2b"/>
        <circle cx="116" cy="98" r="7" fill="#2b2b2b"/>
        <circle cx="86.5" cy="95.5" r="2.2" fill="#fff"/>
        <circle cx="118.5" cy="95.5" r="2.2" fill="#fff"/>
        <!-- muzzle -->
        <ellipse cx="100" cy="122" rx="22" ry="17" fill="#f6f6f6" stroke="#2b2b2b" stroke-width="3"/>
        <ellipse cx="100" cy="116" rx="8" ry="6" fill="#2b2b2b"/>
        <path d="M100 122 v9 M100 131 q-9 6 -16 1 M100 131 q9 6 16 1"
              fill="none" stroke="#2b2b2b" stroke-width="2.6" stroke-linecap="round"/>

        <!-- ===== rescue cap (Chase-style) ===== -->
        <g id="hatOnPuppy" class="removable" style="display:none">
          <!-- peak / brim (inherit group color) -->
          <path d="M58 70 q42 16 84 0 q2 9 -6 13 q-36 12 -72 0 q-8 -4 -6 -13 Z"
                stroke="#1f2937" stroke-width="2.6" stroke-linejoin="round"/>
          <!-- crown (inherit group color) -->
          <path d="M64 70 q36 -40 72 0 Z" stroke="#1f2937" stroke-width="3" stroke-linejoin="round"/>
          <!-- badge: white circle + paw -->
          <circle cx="100" cy="55" r="10" fill="#fff" stroke="#1f2937" stroke-width="2.4"/>
          <use href="#paw" x="100" y="56" />
        </g>
      </svg>
    </div>

    <div class="row-block">
      <div class="row-head">
        <span class="row-label">🦺 וסטים · Vests</span>
        <button class="shuffle-btn" id="shuffleVest">🔀 ערבוב צבעים</button>
      </div>
      <div class="swatches" id="vestSwatches"></div>
    </div>

    <div class="row-block">
      <div class="row-head">
        <span class="row-label">🧢 כובעים · Hats</span>
        <button class="shuffle-btn" id="shuffleHat">🔀 ערבוב צבעים</button>
      </div>
      <div class="swatches" id="hatSwatches"></div>
    </div>

    <div class="hint" id="hint">טיפ: לחיצה על הכובע או הוסט שעל הכלבלב — מסירה אותו 😊</div>
    <div class="footer">תצוגה מקדימה · sandbox · <a class="home" href="../index.html" target="_top">דף הבית</a></div>
  </div>
</div>

<script>
"use strict";

// larger named palette — shuffling swaps the COLORS themselves (not positions)
const PALETTE = [
  { name: "Red",    hex: "#e23b3b" },
  { name: "Blue",   hex: "#3b6fe2" },
  { name: "Green",  hex: "#2faa55" },
  { name: "Yellow", hex: "#f2c200" },
  { name: "Purple", hex: "#8e44ad" },
  { name: "Pink",   hex: "#ff6fa5" },
  { name: "Orange", hex: "#ef7d1a" },
  { name: "Brown",  hex: "#8b5a2b" },
  { name: "Black",  hex: "#2c2c2c" },
  { name: "White",  hex: "#ffffff" },
  { name: "Gray",   hex: "#9aa3ad" },
  { name: "Gold",   hex: "#d4af37" }
];
const ROW_SIZE = 4;

// each row holds 4 color objects; start mismatched
let vestColors = PALETTE.slice(0, 4);
let hatColors  = PALETTE.slice(4, 8);

// track consecutive shuffles on the same palette
let streakRow = null;     // 'vest' | 'hat'
let streakCount = 0;

const vestSwatches = document.getElementById("vestSwatches");
const hatSwatches  = document.getElementById("hatSwatches");

const vestOnPuppy = document.getElementById("vestOnPuppy");
const hatOnPuppy  = document.getElementById("hatOnPuppy");

function speak(text) {
  try {
    if (!("speechSynthesis" in window)) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "en-US";
    u.rate = 0.85;
    u.pitch = 1.15;
    window.speechSynthesis.speak(u);
  } catch (e) { /* speech not available */ }
}

function vestIcon(hex) {
  const stroke = "#1f2937";
  return '<svg viewBox="0 0 60 60">'
    + '<path d="M16 14 q14 -7 28 0 l-2 9 q-12 -5 -24 0 Z" fill="' + hex + '" stroke="' + stroke + '" stroke-width="2"/>'
    + '<path d="M12 22 q18 -8 36 0 q6 17 4 30 h-44 q-2 -13 4 -30 Z" fill="' + hex + '" stroke="' + stroke + '" stroke-width="2.4"/>'
    + '<circle cx="30" cy="34" r="8" fill="#fff" stroke="' + stroke + '" stroke-width="2"/>'
    + '<ellipse cx="30" cy="36" rx="2.2" ry="1.8" fill="#2b2b2b"/>'
    + '<circle cx="27.7" cy="33.4" r="1" fill="#2b2b2b"/><circle cx="29.2" cy="32.2" r="1" fill="#2b2b2b"/>'
    + '<circle cx="30.8" cy="32.2" r="1" fill="#2b2b2b"/><circle cx="32.3" cy="33.4" r="1" fill="#2b2b2b"/>'
    + '</svg>';
}
function hatIcon(hex) {
  const stroke = "#1f2937";
  return '<svg viewBox="0 0 60 60">'
    + '<path d="M10 36 q20 9 40 0 q1 6 -4 9 q-16 7 -32 0 q-5 -3 -4 -9 Z" fill="' + hex + '" stroke="' + stroke + '" stroke-width="2"/>'
    + '<path d="M15 36 q15 -22 30 0 Z" fill="' + hex + '" stroke="' + stroke + '" stroke-width="2.4"/>'
    + '<circle cx="30" cy="24" r="7" fill="#fff" stroke="' + stroke + '" stroke-width="2"/>'
    + '<ellipse cx="30" cy="26" rx="2" ry="1.6" fill="#2b2b2b"/>'
    + '<circle cx="28" cy="23.6" r="0.9" fill="#2b2b2b"/><circle cx="29.3" cy="22.6" r="0.9" fill="#2b2b2b"/>'
    + '<circle cx="30.7" cy="22.6" r="0.9" fill="#2b2b2b"/><circle cx="32" cy="23.6" r="0.9" fill="#2b2b2b"/>'
    + '</svg>';
}

function wearVest(color) {
  vestOnPuppy.setAttribute("fill", color.hex);
  vestOnPuppy.style.display = "";
  speak(color.name);
}
function wearHat(color) {
  hatOnPuppy.setAttribute("fill", color.hex);
  hatOnPuppy.style.display = "";
  speak(color.name);
}

vestOnPuppy.addEventListener("click", function () { vestOnPuppy.style.display = "none"; });
hatOnPuppy.addEventListener("click", function () { hatOnPuppy.style.display = "none"; });

function renderRow(container, colors, iconFn, wearFn) {
  container.innerHTML = "";
  colors.forEach(function (color) {
    const btn = document.createElement("button");
    btn.className = "swatch";
    btn.setAttribute("aria-label", color.name);
    btn.title = color.name;
    btn.innerHTML = iconFn(color.hex);
    btn.addEventListener("click", function () { wearFn(color); });
    container.appendChild(btn);
  });
}
function renderVests() { renderRow(vestSwatches, vestColors, vestIcon, wearVest); }
function renderHats()  { renderRow(hatSwatches,  hatColors,  hatIcon,  wearHat); }

function sameColors(a, b) {
  for (let i = 0; i < a.length; i++) { if (a[i].name !== b[i].name) return false; }
  return true;
}
function pickNewColors() {
  const pool = PALETTE.slice();
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    const t = pool[i]; pool[i] = pool[j]; pool[j] = t;
  }
  return pool.slice(0, ROW_SIZE);
}

function doShuffle(row) {
  const isVest = row === "vest";
  const myColors    = isVest ? vestColors : hatColors;
  const otherColors = isVest ? hatColors : vestColors;

  if (streakRow === row) { streakCount++; } else { streakRow = row; streakCount = 1; }

  let next;
  if (streakCount >= 3 && !sameColors(myColors, otherColors)) {
    // third shuffle in a row that still does not match -> make it identical to the other row
    next = otherColors.map(function (c) { return c; });
    streakCount = 0;
  } else {
    // swap to brand-new colors from the palette
    do { next = pickNewColors(); } while (sameColors(next, myColors));
  }

  if (isVest) { vestColors = next; renderVests(); }
  else        { hatColors  = next; renderHats(); }
}

document.getElementById("shuffleVest").addEventListener("click", function () { doShuffle("vest"); });
document.getElementById("shuffleHat").addEventListener("click", function () { doShuffle("hat"); });

renderVests();
renderHats();
</script>
</body>
</html>
